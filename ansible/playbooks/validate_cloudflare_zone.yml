---
- name: "{{ cf_zone.zone }} | Read Cloudflare zone"
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones?name={{ cf_zone.zone }}"
    method: GET
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: application/json
  register: cloudflare_zones

- name: "{{ cf_zone.zone }} | Assert zone found"
  ansible.builtin.assert:
    that:
      - cloudflare_zones.json.result | length > 0
    fail_msg: "Cloudflare zone not found for {{ cf_zone.zone }}"

- name: "{{ cf_zone.zone }} | Select zone ID"
  ansible.builtin.set_fact:
    cloudflare_zone_id: "{{ cloudflare_zones.json.result[0].id }}"

- name: "{{ cf_zone.zone }} | Validate DNS records"
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records?type={{ item.type }}&name={{ item.name }}"
    method: GET
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: application/json
  register: cloudflare_record_lookup
  loop: "{{ cf_zone.records }}"

- name: "{{ cf_zone.zone }} | Assert DNS records match expected content"
  ansible.builtin.assert:
    that:
      - item.json.result | length > 0
      - item.json.result[0].content == (cloudflare_public_ip_value if item.item.content == 'public_ip' else item.item.content)
    fail_msg: "Cloudflare DNS record mismatch for {{ item.item.name }}"
  loop: "{{ cloudflare_record_lookup.results }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: "{{ cf_zone.zone }} | Resolve non-proxied DNS records via public resolver"
  ansible.builtin.command: "dig +short @1.1.1.1 {{ item.name }}"
  register: external_dns_queries
  changed_when: false
  loop: "{{ cf_zone.records | rejectattr('proxied', 'equalto', true) | list }}"

- name: "{{ cf_zone.zone }} | Assert non-proxied records resolve to expected content"
  ansible.builtin.assert:
    that:
      - item.item.content in (item.stdout_lines | default([]))
    fail_msg: "Expected {{ item.item.name }} to resolve to {{ item.item.content }} via public DNS"
  loop: "{{ external_dns_queries.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"

- name: "{{ cf_zone.zone }} | Look up records that should be removed"
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records?name={{ item }}"
    method: GET
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: application/json
    timeout: 60
  register: cloudflare_remove_lookup
  retries: 3
  delay: 5
  until: cloudflare_remove_lookup is succeeded
  loop: "{{ cf_zone.remove_records | default([]) }}"

- name: "{{ cf_zone.zone }} | Assert removed records are absent"
  ansible.builtin.assert:
    that:
      - item.json.result | length == 0
    fail_msg: "Cloudflare DNS record still present for {{ item.item }}"
  loop: "{{ cloudflare_remove_lookup.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"
