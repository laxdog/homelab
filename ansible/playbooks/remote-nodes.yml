- name: Configure remote node baseline
  hosts: remote_nodes_hosts
  become: true
  gather_facts: true
  vars:
    config: "{{ lookup('file', playbook_dir ~ '/../../config/homelab.yaml') | from_yaml }}"
  pre_tasks:
    - name: Load vault secrets when available
      ansible.builtin.include_vars:
        file: ../secrets.yml
      no_log: true
      when: lookup('env', 'ANSIBLE_VAULT_PASSWORD_FILE') | length > 0
    - name: Load WiFi vault secrets when available
      ansible.builtin.include_vars:
        file: ../secrets-wifi.yml
      no_log: true
      when:
        - lookup('env', 'ANSIBLE_VAULT_PASSWORD_FILE') | length > 0
        - lookup('file', playbook_dir ~ '/../secrets-wifi.yml', errors='ignore') | length > 0
  roles:
    - remote-node-baseline
    - tailscale-node
