- name: Configure RR DB access over Tailscale
  hosts: rr_db_access_hosts
  become: true
  gather_facts: true
  vars:
    config: "{{ lookup('file', playbook_dir ~ '/../../config/homelab.yaml') | from_yaml }}"
  pre_tasks:
    - name: Load vault secrets when available
      ansible.builtin.include_vars:
        file: ../secrets.yml
      no_log: true
      when: lookup('env', 'ANSIBLE_VAULT_PASSWORD_FILE') | length > 0
    - name: Load RR staging DB access secrets when available
      ansible.builtin.include_vars:
        file: ../secrets-rr-staging.yml
      no_log: true
      when:
        - lookup('env', 'ANSIBLE_VAULT_PASSWORD_FILE') | length > 0
        - lookup('ansible.builtin.file', playbook_dir ~ '/../secrets-rr-staging.yml', errors='ignore') | length > 0
  roles:
    - rr-db-access

