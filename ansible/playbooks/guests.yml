- name: Configure Nagios
  hosts: nagios_hosts
  become: true
  gather_facts: false
  vars:
    config: "{{ lookup('file', playbook_dir ~ '/../../config/homelab.yaml') | from_yaml }}"
  pre_tasks:
    - name: Wait for SSH on Nagios host
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 22
        timeout: 120
        delay: 3
      delegate_to: localhost
      become: false
    - name: Load vault secrets when available
      ansible.builtin.include_vars:
        file: ../secrets.yml
      no_log: true
      when: lookup('env', 'ANSIBLE_VAULT_PASSWORD_FILE') | length > 0
  roles:
    - nagios

