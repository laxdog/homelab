---
- name: Validate vault secrets
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    config: "{{ lookup('file', playbook_dir ~ '/../../config/homelab.yaml') | from_yaml }}"
  tasks:
    - name: Assert vault password file configured
      ansible.builtin.assert:
        that:
          - lookup('env', 'ANSIBLE_VAULT_PASSWORD_FILE') | length > 0
        fail_msg: "ANSIBLE_VAULT_PASSWORD_FILE not set; unable to validate vault secrets."

    - name: Load vault secrets
      ansible.builtin.include_vars:
        file: ../secrets.yml
      no_log: true

    - name: Assert required vault secrets are defined
      ansible.builtin.assert:
        that:
          - vars[item] is defined
          - (vars[item] | string | length) > 0
        fail_msg: "Vault secret '{{ item }}' is missing or empty."
      loop: "{{ config.validation.vault_required_vars | default([]) }}"

- name: Validate Proxmox host
  hosts: proxmox_hosts
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../../config/homelab.yaml"
  tasks:
    - name: Determine if public IP lookup is required
      ansible.builtin.set_fact:
        cloudflare_public_ip_required: "{{ (config.cloudflare.records | default([]) | selectattr('content', 'equalto', 'public_ip') | list | length) > 0 }}"

    - name: Fetch public IP for Cloudflare validation
      ansible.builtin.uri:
        url: https://api.ipify.org?format=json
        method: GET
      register: cloudflare_public_ip
      when: cloudflare_public_ip_required | bool

    - name: Set Cloudflare public IP fact
      ansible.builtin.set_fact:
        cloudflare_public_ip_value: "{{ cloudflare_public_ip.json.ip }}"
      when: cloudflare_public_ip_required | bool
    - name: Check Proxmox version
      ansible.builtin.command: pveversion -v
      changed_when: false

    - name: Read ZFS datasets
      ansible.builtin.command: zfs list -H -o name
      register: zfs_list
      changed_when: false

    - name: Assert expected datasets exist
      ansible.builtin.assert:
        that:
          - item.name in zfs_list.stdout_lines
        fail_msg: "Missing ZFS dataset: {{ item.name }}"
      loop: "{{ storage.zfs.datasets }}"

    - name: Read Proxmox storage status
      ansible.builtin.command: pvesm status
      register: pvesm_status
      changed_when: false

    - name: Assert expected storages exist
      ansible.builtin.assert:
        that:
          - item in pvesm_status.stdout
        fail_msg: "Missing Proxmox storage ID: {{ item }}"
      loop: "{{ proxmox.storages.values() | list }}"

    - name: Read Proxmox realms
      ansible.builtin.command: pveum realm list --output-format json
      register: proxmox_realms
      changed_when: false

    - name: Assert Proxmox OIDC realm exists
      ansible.builtin.assert:
        that:
          - (proxmox_realms.stdout | from_json
             | selectattr('realm', 'equalto', proxmox.oidc.realm)
             | list
             | length) > 0
        fail_msg: "Missing Proxmox OIDC realm '{{ proxmox.oidc.realm }}'."

    - name: Scan subnet for live hosts
      ansible.builtin.command: "nmap -sn {{ network.subnet }} -oG -"
      register: nmap_scan
      changed_when: false

    - name: Extract live IPs
      ansible.builtin.set_fact:
        live_ips: >-
          {{ nmap_scan.stdout_lines
             | select('match', '^Host: [0-9.]+')
             | map('regex_replace', '^Host: ([0-9.]+).*', '\\1')
             | list }}

    - name: Build guest IP range list
      ansible.builtin.set_fact:
        subnet_base: "{{ network.subnet.split('/')[0].split('.')[0:3] | join('.') }}"

    - name: Build guest IP range list (continued)
      ansible.builtin.set_fact:
        guest_ip_range: >-
          {{ range(network.ranges.guests.start | int, (network.ranges.guests.end | int) + 1)
             | map('string')
             | map('regex_replace', '^(.*)$', subnet_base ~ '.\\1')
             | list }}

    - name: Collect expected guest IPs
      ansible.builtin.set_fact:
        expected_guest_ips: >-
          {{ (services.vms | dict2items | map(attribute='value.ip') | list)
             + (services.lxcs | dict2items | map(attribute='value.ip') | list) }}

    - name: Find unexpected live IPs in guest range
      ansible.builtin.set_fact:
        unexpected_guest_ips: >-
          {{ live_ips
             | select('in', guest_ip_range)
             | reject('in', expected_guest_ips)
             | list }}

    - name: Assert no unexpected live IPs in guest range
      ansible.builtin.assert:
        that:
          - unexpected_guest_ips | length == 0
        fail_msg: "Unexpected live IPs in guest range: {{ unexpected_guest_ips | join(', ') }}"

- name: Validate guest access
  hosts: guests
  gather_facts: false
  tasks:
    - name: Ensure SSH reachable
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 22
        timeout: 5

- name: Validate apt-cacher proxy configuration
  hosts: guests
  gather_facts: true
  vars:
    config: "{{ lookup('file', playbook_dir ~ '/../../config/homelab.yaml') | from_yaml }}"
  tasks:
    - name: Check apt proxy configuration
      ansible.builtin.slurp:
        src: /etc/apt/apt.conf.d/01proxy
      register: apt_proxy_config
      when:
        - config.apt_cacher.enabled | default(false)
        - ansible_facts.os_family == 'Debian'
        - inventory_hostname != 'apt-cacher-ng'

    - name: Assert apt proxy configured for apt-cacher
      ansible.builtin.assert:
        that:
          - apt_proxy_config.content | b64decode is search(config.apt_cacher.host | string)
        fail_msg: "apt-cacher proxy config missing or incorrect on {{ inventory_hostname }}"
      when:
        - config.apt_cacher.enabled | default(false)
        - ansible_facts.os_family == 'Debian'
        - inventory_hostname != 'apt-cacher-ng'

- name: Validate Docker hosts
  hosts: docker_hosts
  gather_facts: false
  become: true
  tasks:
    - name: Check Docker service
      ansible.builtin.command: systemctl is-active --quiet docker
      changed_when: false

    - name: Check Docker CLI
      ansible.builtin.command: docker info
      changed_when: false

- name: Validate media stack
  hosts: media_hosts
  gather_facts: false
  tasks:
    - name: Verify compose file installed
      ansible.builtin.stat:
        path: /opt/media-stack/docker-compose.yaml
      register: media_compose

    - name: Assert compose file present
      ansible.builtin.assert:
        that:
          - media_compose.stat.exists
        fail_msg: "Media stack compose file missing at /opt/media-stack/docker-compose.yaml"

- name: Validate AdGuard Home
  hosts: adguard_hosts
  gather_facts: false
  vars:
    config: "{{ lookup('file', playbook_dir ~ '/../../config/homelab.yaml') | from_yaml }}"
  tasks:
    - name: Check AdGuard Home service
      ansible.builtin.command: systemctl is-active --quiet AdGuardHome
      changed_when: false

    - name: Check AdGuard DNS port
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: "{{ config.adguard.dns.port }}"
        timeout: 5

    - name: Check AdGuard HTTP port
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: "{{ config.adguard.bind_port }}"
        timeout: 5

    - name: Resolve known good domain through AdGuard
      ansible.builtin.command: "dig +short @{{ ansible_host }} {{ config.adguard.tests.good_domain }}"
      register: adguard_good_query
      changed_when: false

    - name: Assert known good domain resolves
      ansible.builtin.assert:
        that:
          - adguard_good_query.stdout_lines | length > 0
        fail_msg: "Expected {{ config.adguard.tests.good_domain }} to resolve via AdGuard"

    - name: Resolve known bad domain through AdGuard
      ansible.builtin.command: "dig +short @{{ ansible_host }} {{ config.adguard.tests.bad_domain }}"
      register: adguard_bad_query
      changed_when: false

    - name: Assert known bad domain is blocked
      ansible.builtin.assert:
        that:
          - (adguard_bad_query.stdout_lines | first | default('')) in ['', '0.0.0.0', '::']
        fail_msg: "Expected {{ config.adguard.tests.bad_domain }} to be blocked via AdGuard"

    - name: Resolve internal rewrites through AdGuard
      ansible.builtin.command: "dig +short @{{ ansible_host }} {{ item.domain }}"
      register: adguard_rewrite_queries
      changed_when: false
      loop: "{{ config.adguard.rewrites | default([]) }}"

    - name: Assert AdGuard rewrites resolve to expected IP
      ansible.builtin.assert:
        that:
          - item.item.answer in (item.stdout_lines | default([]))
        fail_msg: "Expected {{ item.item.domain }} to resolve to {{ item.item.answer }} via AdGuard"
      loop: "{{ adguard_rewrite_queries.results | default([]) }}"

- name: Validate Nginx Proxy Manager configuration
  hosts: nginx_proxy_manager_hosts
  gather_facts: false
  vars:
    config: "{{ lookup('file', playbook_dir ~ '/../../config/homelab.yaml') | from_yaml }}"
  pre_tasks:
    - name: Load vault secrets when available
      ansible.builtin.include_vars:
        file: ../secrets.yml
      no_log: true
      when: lookup('env', 'ANSIBLE_VAULT_PASSWORD_FILE') | length > 0
  tasks:
    - name: Login to NPM API
      ansible.builtin.uri:
        url: http://127.0.0.1:81/api/tokens
        method: POST
        body_format: json
        body:
          identity: "{{ config.npm.api_email }}"
          secret: "{{ npm_api_password }}"
      register: npm_login

    - name: Assert NPM API login succeeded
      ansible.builtin.assert:
        that:
          - npm_login.status in [200, 201]
          - npm_login.json.token is defined
        fail_msg: "Unable to authenticate to NPM API."

    - name: Read NPM access lists
      ansible.builtin.uri:
        url: http://127.0.0.1:81/api/nginx/access-lists
        method: GET
        headers:
          Authorization: "Bearer {{ npm_login.json.token }}"
      register: npm_access_lists

    - name: Normalize NPM access list response
      ansible.builtin.set_fact:
        npm_access_list_items: "{{ npm_access_lists.json.data | default(npm_access_lists.json) }}"

    - name: Build access list ID map
      ansible.builtin.set_fact:
        npm_access_list_map: >-
          {{ dict(npm_access_list_items | map(attribute='name') | list
             | zip(npm_access_list_items | map(attribute='id') | list)) }}

    - name: Build effective proxy host list
      ansible.builtin.set_fact:
        npm_proxy_hosts_effective: >-
          {{ config.npm.proxy_hosts
             + ((config.npm.external_proxy_hosts | default([]))
                if (config.npm.external_enabled | default(false)) else []) }}

    - name: Assert expected access lists exist
      ansible.builtin.assert:
        that:
          - npm_access_list_map[item.name] is defined
        fail_msg: "NPM access list '{{ item.name }}' not found."
      loop: "{{ config.npm.access_lists }}"

    - name: Read NPM proxy hosts
      ansible.builtin.uri:
        url: http://127.0.0.1:81/api/nginx/proxy-hosts
        method: GET
        headers:
          Authorization: "Bearer {{ npm_login.json.token }}"
      register: npm_proxy_hosts

    - name: Normalize NPM proxy host response
      ansible.builtin.set_fact:
        npm_proxy_host_items: "{{ npm_proxy_hosts.json.data | default(npm_proxy_hosts.json) }}"

    - name: Assert unwanted proxy hosts are absent
      ansible.builtin.assert:
        that:
          - (npm_proxy_host_items | selectattr('domain_names', 'contains', item) | list | length) == 0
        fail_msg: "NPM proxy host still present for {{ item }}"
      loop: "{{ config.npm.remove_proxy_hosts | default([]) }}"

    - name: Resolve expected proxy host
      ansible.builtin.set_fact:
        npm_proxy_host: >-
          {{ (npm_proxy_host_items
              | selectattr('domain_names', 'contains', item.domain)
              | list
              | first) | default({}) }}
      loop: "{{ npm_proxy_hosts_effective }}"
      register: npm_proxy_host_results

    - name: Assert NPM proxy hosts exist
      ansible.builtin.assert:
        that:
          - item.ansible_facts.npm_proxy_host | length > 0
        fail_msg: "NPM proxy host missing for {{ item.item.domain }}"
      loop: "{{ npm_proxy_host_results.results }}"

    - name: Assert NPM proxy hosts use access lists
      ansible.builtin.assert:
        that:
          - (item.ansible_facts.npm_proxy_host.access_list_id | int) == (npm_access_list_map[item.item.access_list] | int)
        fail_msg: "NPM proxy host missing access list for {{ item.item.domain }}"
      loop: "{{ npm_proxy_host_results.results }}"

    - name: Assert NPM proxy hosts enforce HTTPS when configured
      ansible.builtin.assert:
        that:
          - (item.item.ssl | default(false)) == false or (item.ansible_facts.npm_proxy_host.ssl_forced | default(false)) | bool
          - (item.item.ssl | default(false)) == false or (item.ansible_facts.npm_proxy_host.certificate_id | int) > 0
        fail_msg: "NPM proxy host missing HTTPS config for {{ item.item.domain }}"
      loop: "{{ npm_proxy_host_results.results }}"

    - name: Assert NPM proxy host forward scheme matches config
      ansible.builtin.assert:
        that:
          - (item.ansible_facts.npm_proxy_host.forward_scheme | default('http')) == (item.item.forward_scheme | default('http'))
        fail_msg: "NPM proxy host forward scheme mismatch for {{ item.item.domain }}"
      loop: "{{ npm_proxy_host_results.results }}"

- name: Validate NPM HTTPS endpoints via Proxmox
  hosts: proxmox_hosts
  gather_facts: false
  vars:
    config: "{{ lookup('file', playbook_dir ~ '/../../config/homelab.yaml') | from_yaml }}"
  tasks:
    - name: Build effective proxy host list
      ansible.builtin.set_fact:
        npm_proxy_hosts_effective: >-
          {{ config.npm.proxy_hosts
             + ((config.npm.external_proxy_hosts | default([]))
                if (config.npm.external_enabled | default(false)) else []) }}

    - name: Check HTTPS response via NPM for internal domains
      ansible.builtin.command: >-
        curl -k -s -o /dev/null -w "%{http_code}" --max-time 15
        --resolve {{ item.domain }}:443:{{ config.services.lxcs['nginx-proxy-manager'].ip }}
        https://{{ item.domain }}
      register: npm_https_checks
      changed_when: false
      loop: "{{ npm_proxy_hosts_effective | selectattr('ssl', 'defined') | selectattr('ssl') | list }}"

    - name: Assert NPM HTTPS endpoints are reachable
      ansible.builtin.assert:
        that:
          - item.stdout | int in (config.validation.http_expected_codes[item.item.domain] | default([200, 301, 302, 401]))
        fail_msg: "Unexpected HTTPS response for {{ item.item.domain }}: {{ item.stdout }}"
      loop: "{{ npm_https_checks.results | default([]) }}"

    - name: Check HTTP redirects to HTTPS via NPM for internal domains
      ansible.builtin.command: >-
        curl -k -s -o /dev/null -w "%{http_code}" --max-time 15
        --resolve {{ item.domain }}:80:{{ config.services.lxcs['nginx-proxy-manager'].ip }}
        http://{{ item.domain }}
      register: npm_http_checks
      changed_when: false
      loop: "{{ npm_proxy_hosts_effective | selectattr('ssl', 'defined') | selectattr('ssl') | list }}"

    - name: Assert HTTP redirects to HTTPS
      ansible.builtin.assert:
        that:
          - item.stdout | int in [301, 302]
        fail_msg: "Expected HTTP redirect to HTTPS for {{ item.item.domain }}, got {{ item.stdout }}"
      loop: "{{ npm_http_checks.results | default([]) }}"

    - name: Check Authentik internal endpoint via NPM
      ansible.builtin.command: >-
        curl -k -s -o /dev/null -w "%{http_code}" --max-time 15
        --resolve {{ config.authentik.internal_domain }}:443:{{ config.services.lxcs['nginx-proxy-manager'].ip }}
        https://{{ config.authentik.internal_domain }}
      register: authentik_internal_check
      changed_when: false

    - name: Check Authentik external endpoint via NPM
      ansible.builtin.command: >-
        curl -k -s -o /dev/null -w "%{http_code}" --max-time 15
        --resolve {{ config.authentik.external_domain }}:443:{{ config.services.lxcs['nginx-proxy-manager'].ip }}
        https://{{ config.authentik.external_domain }}
      register: authentik_external_check
      changed_when: false

    - name: Assert Authentik endpoints reachable
      ansible.builtin.assert:
        that:
          - authentik_internal_check.stdout | int in [200, 302]
          - authentik_external_check.stdout | int in [200, 302]
        fail_msg: "Authentik endpoint checks failed (internal {{ authentik_internal_check.stdout }}, external {{ authentik_external_check.stdout }})"

    - name: Fetch Proxmox OIDC well-known metadata via NPM
      ansible.builtin.command: >-
        curl -k -s --max-time 15
        --resolve {{ config.authentik.external_domain }}:443:{{ config.services.lxcs['nginx-proxy-manager'].ip }}
        https://{{ config.authentik.external_domain }}/application/o/{{ config.proxmox.oidc.slug }}/.well-known/openid-configuration
      register: proxmox_oidc_wellknown
      changed_when: false

    - name: Parse Proxmox OIDC well-known metadata
      ansible.builtin.set_fact:
        proxmox_oidc_wellknown_json: "{{ proxmox_oidc_wellknown.stdout | from_json }}"

    - name: Assert Proxmox OIDC JWKS URI exists
      ansible.builtin.assert:
        that:
          - proxmox_oidc_wellknown_json.jwks_uri is defined
          - proxmox_oidc_wellknown_json.jwks_uri | length > 0
        fail_msg: "Missing jwks_uri in Proxmox OIDC metadata."

    - name: Fetch Proxmox OIDC JWKS document via NPM
      ansible.builtin.command: >-
        curl -k -s --max-time 15
        --resolve {{ config.authentik.external_domain }}:443:{{ config.services.lxcs['nginx-proxy-manager'].ip }}
        {{ proxmox_oidc_wellknown_json.jwks_uri }}
      register: proxmox_oidc_jwks
      changed_when: false

    - name: Parse Proxmox OIDC JWKS document
      ansible.builtin.set_fact:
        proxmox_oidc_jwks_json: "{{ proxmox_oidc_jwks.stdout | from_json }}"

    - name: Assert Proxmox OIDC JWKS contains keys
      ansible.builtin.assert:
        that:
          - proxmox_oidc_jwks_json['keys'] is defined
          - proxmox_oidc_jwks_json['keys'] | type_debug == 'list'
          - proxmox_oidc_jwks_json['keys'] | length > 0
        fail_msg: "Proxmox OIDC JWKS is invalid or empty: {{ proxmox_oidc_jwks.stdout }}"

    - name: Check Authentik outpost ping via NPM
      ansible.builtin.command: >-
        curl -k -s -o /dev/null -w "%{http_code}" --max-time 15
        --resolve {{ config.authentik.external_domain }}:443:{{ config.services.lxcs['nginx-proxy-manager'].ip }}
        https://{{ config.authentik.external_domain }}/outpost.goauthentik.io/ping
      register: authentik_outpost_ping
      changed_when: false

    - name: Assert Authentik outpost ping reachable
      ansible.builtin.assert:
        that:
          - authentik_outpost_ping.stdout | int in [200, 204]
        fail_msg: "Authentik outpost ping failed with {{ authentik_outpost_ping.stdout }}"

- name: Validate Cloudflare DNS records
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    config: "{{ lookup('file', playbook_dir ~ '/../../config/homelab.yaml') | from_yaml }}"
  pre_tasks:
    - name: Load vault secrets when available
      ansible.builtin.include_vars:
        file: ../secrets.yml
      no_log: true
      when: lookup('env', 'ANSIBLE_VAULT_PASSWORD_FILE') | length > 0
  tasks:
    - name: Read Cloudflare zones
      ansible.builtin.uri:
        url: "https://api.cloudflare.com/client/v4/zones?name={{ config.cloudflare.zone }}"
        method: GET
        headers:
          Authorization: "Bearer {{ cloudflare_api_token }}"
          Content-Type: application/json
      register: cloudflare_zones

    - name: Assert Cloudflare zone found
      ansible.builtin.assert:
        that:
          - cloudflare_zones.json.result | length > 0
        fail_msg: "Cloudflare zone not found for {{ config.cloudflare.zone }}"

    - name: Select Cloudflare zone ID
      ansible.builtin.set_fact:
        cloudflare_zone_id: "{{ cloudflare_zones.json.result[0].id }}"

    - name: Determine if public IP lookup is required for Cloudflare validation
      ansible.builtin.set_fact:
        cloudflare_public_ip_required: >-
          {{
            (config.cloudflare.records | default([]) | selectattr('content', 'equalto', 'public_ip') | list | length) > 0
          }}

    - name: Fetch public IP for Cloudflare validation
      ansible.builtin.uri:
        url: https://api.ipify.org?format=json
        return_content: true
      register: cloudflare_public_ip
      when: cloudflare_public_ip_required | bool

    - name: Set Cloudflare public IP fact
      ansible.builtin.set_fact:
        cloudflare_public_ip_value: "{{ cloudflare_public_ip.json.ip }}"
      when: cloudflare_public_ip_required | bool

    - name: Validate Cloudflare DNS records
      ansible.builtin.uri:
        url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records?type={{ item.type }}&name={{ item.name }}"
        method: GET
        headers:
          Authorization: "Bearer {{ cloudflare_api_token }}"
          Content-Type: application/json
      register: cloudflare_record_lookup
      loop: "{{ config.cloudflare.records }}"

    - name: Assert Cloudflare DNS records match expected content
      ansible.builtin.assert:
        that:
          - item.json.result | length > 0
          - item.json.result[0].content == (cloudflare_public_ip_value if item.item.content == 'public_ip' else item.item.content)
        fail_msg: "Cloudflare DNS record mismatch for {{ item.item.name }}"
      loop: "{{ cloudflare_record_lookup.results }}"

    - name: Resolve external DNS records via public resolver
      ansible.builtin.command: "dig +short @1.1.1.1 {{ item.name }}"
      register: external_dns_queries
      changed_when: false
      loop: "{{ config.cloudflare.records | rejectattr('proxied', 'equalto', True) | list }}"

    - name: Assert external DNS records resolve to expected content
      ansible.builtin.assert:
        that:
          - item.item.content in (item.stdout_lines | default([]))
        fail_msg: "Expected {{ item.item.name }} to resolve to {{ item.item.content }} via public DNS"
      loop: "{{ external_dns_queries.results | default([]) }}"

    - name: Look up Cloudflare records that should be removed
      ansible.builtin.uri:
        url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records?name={{ item }}"
        method: GET
        headers:
          Authorization: "Bearer {{ cloudflare_api_token }}"
          Content-Type: application/json
        timeout: 60
      register: cloudflare_remove_lookup
      retries: 3
      delay: 5
      until: cloudflare_remove_lookup is succeeded
      loop: "{{ config.cloudflare.remove_records | default([]) }}"

    - name: Assert Cloudflare removed records are absent
      ansible.builtin.assert:
        that:
          - item.json.result | length == 0
        fail_msg: "Cloudflare DNS record still present for {{ item.item }}"
      loop: "{{ cloudflare_remove_lookup.results | default([]) }}"

- name: Validate Organizr
  hosts: organizr_hosts
  gather_facts: false
  vars:
    config: "{{ lookup('file', playbook_dir ~ '/../../config/homelab.yaml') | from_yaml }}"
  pre_tasks:
    - name: Load vault secrets when available
      ansible.builtin.include_vars:
        file: ../secrets.yml
      no_log: true
      when: lookup('env', 'ANSIBLE_VAULT_PASSWORD_FILE') | length > 0
  tasks:
    - name: Check Organizr HTTP port
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 80
        timeout: 10

    - name: Read Organizr tabs
      ansible.builtin.uri:
        url: http://127.0.0.1/api/v2/tabs
        method: GET
        headers:
          token: "{{ organizr_api_key }}"
      register: organizr_tabs
      no_log: true

    - name: Build expected Organizr tab list
      ansible.builtin.set_fact:
        organizr_expected_tabs: "{{ config.npm.proxy_hosts | map(attribute='name') | list }}"

    - name: Build actual Organizr tab list
      ansible.builtin.set_fact:
        organizr_actual_tabs: >-
          {{
            (
              organizr_tabs.json.response.data.tabs
              | default(organizr_tabs.json.data.tabs | default([]))
            )
            | map(attribute='name')
            | list
          }}

    - name: Assert Organizr tabs present
      ansible.builtin.assert:
        that:
          - item in organizr_actual_tabs
        fail_msg: "Organizr tab missing: {{ item }}"
      loop: "{{ organizr_expected_tabs }}"

- name: Validate Heimdall
  hosts: heimdall_hosts
  gather_facts: false
  vars:
    config: "{{ lookup('file', playbook_dir ~ '/../../config/homelab.yaml') | from_yaml }}"
  tasks:
    - name: Check Heimdall HTTP port
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 80
        timeout: 10

    - name: Check Heimdall items
      ansible.builtin.command: >
        sqlite3 /docker/docker-compose-heimdall/config/www/app.sqlite
        "SELECT id FROM items WHERE url='https://{{ item.domain }}' AND deleted_at IS NULL LIMIT 1;"
      register: heimdall_item_check
      changed_when: false
      loop: "{{ config.npm.proxy_hosts }}"

    - name: Assert Heimdall items present
      ansible.builtin.assert:
        that:
          - (item.stdout | default('')) | length > 0
        fail_msg: "Heimdall item missing for https://{{ item.item.domain }}"
      loop: "{{ heimdall_item_check.results | default([]) }}"

- name: Validate Nagios
  hosts: nagios_hosts
  gather_facts: false
  become: true
  vars:
    config: "{{ lookup('file', playbook_dir ~ '/../../config/homelab.yaml') | from_yaml }}"
    nagios_cfg_path: /usr/local/nagios/etc/nagios.cfg
    nagios_homelab_cfg_path: /usr/local/nagios/etc/objects/homelab.cfg
    nagios_expected_host_count: "{{ config.nagios.hosts | length }}"
    nagios_expected_ping_service_count: "{{ config.nagios.hosts | length }}"
    nagios_expected_ssh_service_count: "{{ (config.nagios.hosts | selectattr('check_ssh', 'defined') | selectattr('check_ssh') | list | length) }}"
    nagios_expected_tcp_service_count: "{{ config.validation.service_ports | default([]) | length }}"
    nagios_expected_dns_service_count: "{{ (config.nagios.dns_checks | default([]) | length) + (config.adguard.rewrites | default([]) | length) }}"
    nagios_expected_http_service_count: >-
      {{
        (
          config.npm.proxy_hosts
          + (
            (config.npm.external_proxy_hosts | default([]))
            if (config.npm.external_enabled | default(false))
            else []
          )
        )
        | rejectattr('monitor_http', 'defined')
        | list
        | length
        +
        (
          (
            config.npm.proxy_hosts
            + (
              (config.npm.external_proxy_hosts | default([]))
              if (config.npm.external_enabled | default(false))
              else []
            )
          )
          | selectattr('monitor_http', 'defined')
          | selectattr('monitor_http')
          | list
          | length
        )
      }}
  tasks:
    - name: Check Nagios HTTP port
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 80
        timeout: 10

    - name: Check Nagios service
      ansible.builtin.command: systemctl is-active --quiet nagios
      changed_when: false

    - name: Read Nagios version
      ansible.builtin.command: /usr/local/nagios/bin/nagios -V
      register: nagios_version
      changed_when: false

    - name: Assert Nagios Core version
      ansible.builtin.assert:
        that:
          - nagios_version.stdout is search("Nagios Core {{ config.nagios.core_version }}")
        fail_msg: "Nagios Core version mismatch. Expected {{ config.nagios.core_version }}."

    - name: Verify Nagios config syntax
      ansible.builtin.command: /usr/local/nagios/bin/nagios -v {{ nagios_cfg_path }}
      register: nagios_verify
      changed_when: false

    - name: Assert Nagios config verification succeeded
      ansible.builtin.assert:
        that:
          - nagios_verify.rc == 0
          - nagios_verify.stdout is search("Things look okay")
        fail_msg: "Nagios config verification failed."

    - name: Check Nagios web root redirect
      ansible.builtin.uri:
        url: http://127.0.0.1/
        follow_redirects: none
        status_code: [301, 302]
      changed_when: false

    - name: Check Nagios CGI endpoint
      ansible.builtin.uri:
        url: http://127.0.0.1/nagios/cgi-bin/status.cgi
        status_code: [200, 401]
      changed_when: false

    - name: Count Nagios host definitions
      ansible.builtin.command: grep -cE '^define host \{' {{ nagios_homelab_cfg_path }}
      register: nagios_host_definitions
      changed_when: false

    - name: Count Nagios PING services
      ansible.builtin.command: grep -cE '^[[:space:]]*service_description[[:space:]]+PING$' {{ nagios_homelab_cfg_path }}
      register: nagios_ping_services
      changed_when: false

    - name: Count Nagios SSH services
      ansible.builtin.command: grep -cE '^[[:space:]]*service_description[[:space:]]+SSH$' {{ nagios_homelab_cfg_path }}
      register: nagios_ssh_services
      changed_when: false

    - name: Count Nagios TCP services
      ansible.builtin.command: grep -cE '^[[:space:]]*service_description[[:space:]]+TCP ' {{ nagios_homelab_cfg_path }}
      register: nagios_tcp_services
      changed_when: false

    - name: Count Nagios DNS services
      ansible.builtin.command: grep -cE '^[[:space:]]*service_description[[:space:]]+DNS ' {{ nagios_homelab_cfg_path }}
      register: nagios_dns_services
      changed_when: false

    - name: Count Nagios HTTP services
      ansible.builtin.command: grep -cE '^[[:space:]]*service_description[[:space:]]+HTTP ' {{ nagios_homelab_cfg_path }}
      register: nagios_http_services
      changed_when: false

    - name: Assert Nagios rendered object counts match config
      ansible.builtin.assert:
        that:
          - (nagios_host_definitions.stdout | int) == (nagios_expected_host_count | int)
          - (nagios_ping_services.stdout | int) == (nagios_expected_ping_service_count | int)
          - (nagios_ssh_services.stdout | int) == (nagios_expected_ssh_service_count | int)
          - (nagios_tcp_services.stdout | int) == (nagios_expected_tcp_service_count | int)
          - (nagios_dns_services.stdout | int) == (nagios_expected_dns_service_count | int)
          - (nagios_http_services.stdout | int) == (nagios_expected_http_service_count | int)
        fail_msg: "Nagios rendered object counts do not match config."

- name: Validate service ports
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    config: "{{ lookup('file', playbook_dir ~ '/../../config/homelab.yaml') | from_yaml }}"
  tasks:
    - name: Check service port
      ansible.builtin.wait_for:
        host: "{{ item.host }}"
        port: "{{ item.port }}"
        timeout: 10
      loop: "{{ config.validation.service_ports | default([]) }}"
