---
- name: Validate Proxmox host
  hosts: proxmox_hosts
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../../config/homelab.yaml"
  tasks:
    - name: Check Proxmox version
      ansible.builtin.command: pveversion -v
      changed_when: false

    - name: Read ZFS datasets
      ansible.builtin.command: zfs list -H -o name
      register: zfs_list
      changed_when: false

    - name: Assert expected datasets exist
      ansible.builtin.assert:
        that:
          - item.name in zfs_list.stdout_lines
        fail_msg: "Missing ZFS dataset: {{ item.name }}"
      loop: "{{ storage.zfs.datasets }}"

    - name: Read Proxmox storage status
      ansible.builtin.command: pvesm status
      register: pvesm_status
      changed_when: false

    - name: Assert expected storages exist
      ansible.builtin.assert:
        that:
          - item in pvesm_status.stdout
        fail_msg: "Missing Proxmox storage ID: {{ item }}"
      loop: "{{ proxmox.storages.values() | list }}"

    - name: Scan subnet for live hosts
      ansible.builtin.command: "nmap -sn {{ network.subnet }} -oG -"
      register: nmap_scan
      changed_when: false

    - name: Extract live IPs
      ansible.builtin.set_fact:
        live_ips: >-
          {{ nmap_scan.stdout_lines
             | select('match', '^Host: [0-9.]+')
             | map('regex_replace', '^Host: ([0-9.]+).*', '\\1')
             | list }}

    - name: Build guest IP range list
      ansible.builtin.set_fact:
        subnet_base: "{{ network.subnet.split('/')[0].split('.')[0:3] | join('.') }}"

    - name: Build guest IP range list (continued)
      ansible.builtin.set_fact:
        guest_ip_range: >-
          {{ range(network.ranges.guests.start | int, (network.ranges.guests.end | int) + 1)
             | map('string')
             | map('regex_replace', '^(.*)$', subnet_base ~ '.\\1')
             | list }}

    - name: Collect expected guest IPs
      ansible.builtin.set_fact:
        expected_guest_ips: >-
          {{ (services.vms | dict2items | map(attribute='value.ip') | list)
             + (services.lxcs | dict2items | map(attribute='value.ip') | list) }}

    - name: Find unexpected live IPs in guest range
      ansible.builtin.set_fact:
        unexpected_guest_ips: >-
          {{ live_ips
             | select('in', guest_ip_range)
             | reject('in', expected_guest_ips)
             | list }}

    - name: Assert no unexpected live IPs in guest range
      ansible.builtin.assert:
        that:
          - unexpected_guest_ips | length == 0
        fail_msg: "Unexpected live IPs in guest range: {{ unexpected_guest_ips | join(', ') }}"

- name: Validate guest access
  hosts: guests
  gather_facts: false
  tasks:
    - name: Ensure SSH reachable
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 22
        timeout: 5

- name: Validate Docker hosts
  hosts: docker_hosts
  gather_facts: false
  become: true
  tasks:
    - name: Check Docker service
      ansible.builtin.command: systemctl is-active --quiet docker
      changed_when: false

    - name: Check Docker CLI
      ansible.builtin.command: docker info
      changed_when: false

- name: Validate media stack
  hosts: media_hosts
  gather_facts: false
  tasks:
    - name: Verify compose file installed
      ansible.builtin.stat:
        path: /opt/media-stack/docker-compose.yaml
      register: media_compose

    - name: Assert compose file present
      ansible.builtin.assert:
        that:
          - media_compose.stat.exists
        fail_msg: "Media stack compose file missing at /opt/media-stack/docker-compose.yaml"

- name: Validate AdGuard Home
  hosts: adguard_hosts
  gather_facts: false
  vars:
    config: "{{ lookup('file', playbook_dir ~ '/../../config/homelab.yaml') | from_yaml }}"
  tasks:
    - name: Check AdGuard Home service
      ansible.builtin.command: systemctl is-active --quiet AdGuardHome
      changed_when: false

    - name: Check AdGuard DNS port
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: "{{ config.adguard.dns.port }}"
        timeout: 5

    - name: Check AdGuard HTTP port
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: "{{ config.adguard.bind_port }}"
        timeout: 5

    - name: Resolve known good domain through AdGuard
      ansible.builtin.command: "dig +short @{{ ansible_host }} {{ config.adguard.tests.good_domain }}"
      register: adguard_good_query
      changed_when: false

    - name: Assert known good domain resolves
      ansible.builtin.assert:
        that:
          - adguard_good_query.stdout_lines | length > 0
        fail_msg: "Expected {{ config.adguard.tests.good_domain }} to resolve via AdGuard"

    - name: Resolve known bad domain through AdGuard
      ansible.builtin.command: "dig +short @{{ ansible_host }} {{ config.adguard.tests.bad_domain }}"
      register: adguard_bad_query
      changed_when: false

    - name: Assert known bad domain is blocked
      ansible.builtin.assert:
        that:
          - (adguard_bad_query.stdout_lines | first | default('')) in ['', '0.0.0.0', '::']
        fail_msg: "Expected {{ config.adguard.tests.bad_domain }} to be blocked via AdGuard"

    - name: Resolve internal rewrites through AdGuard
      ansible.builtin.command: "dig +short @{{ ansible_host }} {{ item.domain }}"
      register: adguard_rewrite_queries
      changed_when: false
      loop: "{{ config.adguard.rewrites | default([]) }}"

    - name: Assert AdGuard rewrites resolve to expected IP
      ansible.builtin.assert:
        that:
          - item.item.answer in (item.stdout_lines | default([]))
        fail_msg: "Expected {{ item.item.domain }} to resolve to {{ item.item.answer }} via AdGuard"
      loop: "{{ adguard_rewrite_queries.results | default([]) }}"

- name: Validate Nginx Proxy Manager configuration
  hosts: nginx_proxy_manager_hosts
  gather_facts: false
  vars:
    config: "{{ lookup('file', playbook_dir ~ '/../../config/homelab.yaml') | from_yaml }}"
  pre_tasks:
    - name: Load vault secrets when available
      ansible.builtin.include_vars:
        file: ../secrets.yml
      no_log: true
      when: lookup('env', 'ANSIBLE_VAULT_PASSWORD_FILE') | length > 0
  tasks:
    - name: Login to NPM API
      ansible.builtin.uri:
        url: http://127.0.0.1:81/api/tokens
        method: POST
        body_format: json
        body:
          identity: "{{ config.npm.api_email }}"
          secret: "{{ npm_api_password }}"
      register: npm_login

    - name: Assert NPM API login succeeded
      ansible.builtin.assert:
        that:
          - npm_login.status in [200, 201]
          - npm_login.json.token is defined
        fail_msg: "Unable to authenticate to NPM API."

    - name: Read NPM access lists
      ansible.builtin.uri:
        url: http://127.0.0.1:81/api/nginx/access-lists
        method: GET
        headers:
          Authorization: "Bearer {{ npm_login.json.token }}"
      register: npm_access_lists

    - name: Normalize NPM access list response
      ansible.builtin.set_fact:
        npm_access_list_items: "{{ npm_access_lists.json.data | default(npm_access_lists.json) }}"

    - name: Build access list ID map
      ansible.builtin.set_fact:
        npm_access_list_map: >-
          {{ dict(npm_access_list_items | map(attribute='name') | list
             | zip(npm_access_list_items | map(attribute='id') | list)) }}

    - name: Assert expected access lists exist
      ansible.builtin.assert:
        that:
          - npm_access_list_map[item.name] is defined
        fail_msg: "NPM access list '{{ item.name }}' not found."
      loop: "{{ config.npm.access_lists }}"

    - name: Read NPM proxy hosts
      ansible.builtin.uri:
        url: http://127.0.0.1:81/api/nginx/proxy-hosts
        method: GET
        headers:
          Authorization: "Bearer {{ npm_login.json.token }}"
      register: npm_proxy_hosts

    - name: Normalize NPM proxy host response
      ansible.builtin.set_fact:
        npm_proxy_host_items: "{{ npm_proxy_hosts.json.data | default(npm_proxy_hosts.json) }}"

    - name: Assert unwanted proxy hosts are absent
      ansible.builtin.assert:
        that:
          - (npm_proxy_host_items | selectattr('domain_names', 'contains', item) | list | length) == 0
        fail_msg: "NPM proxy host still present for {{ item }}"
      loop: "{{ config.npm.remove_proxy_hosts | default([]) }}"

    - name: Resolve expected proxy host
      ansible.builtin.set_fact:
        npm_proxy_host: >-
          {{ (npm_proxy_host_items
              | selectattr('domain_names', 'contains', item.domain)
              | list
              | first) | default({}) }}
      loop: "{{ config.npm.proxy_hosts }}"
      register: npm_proxy_host_results

    - name: Assert NPM proxy hosts exist
      ansible.builtin.assert:
        that:
          - item.ansible_facts.npm_proxy_host | length > 0
        fail_msg: "NPM proxy host missing for {{ item.item.domain }}"
      loop: "{{ npm_proxy_host_results.results }}"

    - name: Assert NPM proxy hosts use access lists
      ansible.builtin.assert:
        that:
          - (item.ansible_facts.npm_proxy_host.access_list_id | int) == (npm_access_list_map[item.item.access_list] | int)
        fail_msg: "NPM proxy host missing access list for {{ item.item.domain }}"
      loop: "{{ npm_proxy_host_results.results }}"

- name: Validate Cloudflare DNS records
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    config: "{{ lookup('file', playbook_dir ~ '/../../config/homelab.yaml') | from_yaml }}"
  pre_tasks:
    - name: Load vault secrets when available
      ansible.builtin.include_vars:
        file: ../secrets.yml
      no_log: true
      when: lookup('env', 'ANSIBLE_VAULT_PASSWORD_FILE') | length > 0
  tasks:
    - name: Read Cloudflare zones
      ansible.builtin.uri:
        url: "https://api.cloudflare.com/client/v4/zones?name={{ config.cloudflare.zone }}"
        method: GET
        headers:
          Authorization: "Bearer {{ cloudflare_api_token }}"
          Content-Type: application/json
      register: cloudflare_zones

    - name: Assert Cloudflare zone found
      ansible.builtin.assert:
        that:
          - cloudflare_zones.json.result | length > 0
        fail_msg: "Cloudflare zone not found for {{ config.cloudflare.zone }}"

    - name: Select Cloudflare zone ID
      ansible.builtin.set_fact:
        cloudflare_zone_id: "{{ cloudflare_zones.json.result[0].id }}"

    - name: Validate Cloudflare DNS records
      ansible.builtin.uri:
        url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records?type={{ item.type }}&name={{ item.name }}"
        method: GET
        headers:
          Authorization: "Bearer {{ cloudflare_api_token }}"
          Content-Type: application/json
      register: cloudflare_record_lookup
      loop: "{{ config.cloudflare.records }}"

    - name: Assert Cloudflare DNS records match expected content
      ansible.builtin.assert:
        that:
          - item.json.result | length > 0
          - item.json.result[0].content == item.item.content
        fail_msg: "Cloudflare DNS record mismatch for {{ item.item.name }}"
      loop: "{{ cloudflare_record_lookup.results }}"

    - name: Look up Cloudflare records that should be removed
      ansible.builtin.uri:
        url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records?name={{ item }}"
        method: GET
        headers:
          Authorization: "Bearer {{ cloudflare_api_token }}"
          Content-Type: application/json
      register: cloudflare_remove_lookup
      loop: "{{ config.cloudflare.remove_records | default([]) }}"

    - name: Assert Cloudflare removed records are absent
      ansible.builtin.assert:
        that:
          - item.json.result | length == 0
        fail_msg: "Cloudflare DNS record still present for {{ item.item }}"
      loop: "{{ cloudflare_remove_lookup.results | default([]) }}"

- name: Validate Organizr
  hosts: organizr_hosts
  gather_facts: false
  tasks:
    - name: Check Organizr HTTP port
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 80
        timeout: 10

- name: Validate Heimdall
  hosts: heimdall_hosts
  gather_facts: false
  tasks:
    - name: Check Heimdall HTTP port
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 80
        timeout: 10
