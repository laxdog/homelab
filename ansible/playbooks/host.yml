- name: Configure Proxmox host
  hosts: proxmox-hosts
  become: true
  gather_facts: true
  vars:
    config: "{{ lookup('file', playbook_dir ~ '/../../config/homelab.yaml') | from_yaml }}"
  pre_tasks:
    - name: Load vault secrets when available
      ansible.builtin.include_vars:
        file: ../secrets.yml
      no_log: true
      when: lookup('env', 'ANSIBLE_VAULT_PASSWORD_FILE') | length > 0
  roles:
    - proxmox-host
    - proxmox-storage
    - proxmox-terraform-user
    - nut-server
