- name: Configure Proxmox host
  hosts: proxmox_hosts
  become: true
  gather_facts: true
  vars:
    config: "{{ lookup('file', playbook_dir ~ '/../../config/homelab.yaml') | from_yaml }}"
  pre_tasks:
    - name: Load vault secrets when available
      ansible.builtin.include_vars:
        file: ../secrets.yml
      no_log: true
      when: lookup('env', 'ANSIBLE_VAULT_PASSWORD_FILE') | length > 0

    - name: Warn when terraform_user_password is missing
      ansible.builtin.debug:
        msg: "terraform_user_password not set; skipping terraform user creation"
      when: terraform_user_password is not defined
  roles:
    - proxmox-host
    - proxmox-storage
    - proxmox-templates
    - role: proxmox-terraform-user
      when: terraform_user_password is defined
    - proxmox-oidc
    - nut-server
