- name: Set NetAlertX paths
  ansible.builtin.set_fact:
    netalertx_compose_dir: "/docker/docker-compose-{{ inventory_hostname }}"

- name: Create NetAlertX application directory
  ansible.builtin.file:
    path: "{{ netalertx_compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create NetAlertX data directory
  ansible.builtin.file:
    path: "{{ netalertx_compose_dir }}/data"
    state: directory
    owner: "1000"
    group: "1000"
    mode: '0755'

- name: Copy NetAlertX Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yaml.j2
    dest: "{{ netalertx_compose_dir }}/docker-compose.yaml"
    owner: root
    group: root
    mode: '0644'

- name: Deploy NetAlertX via Docker Compose
  ansible.builtin.command:
    cmd: docker compose up -d
  args:
    chdir: "{{ netalertx_compose_dir }}"
  changed_when: false
