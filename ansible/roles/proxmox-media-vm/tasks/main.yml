---
- name: Read media VM config from Proxmox
  ansible.builtin.command: "qm config {{ config.services.vms['media-stack'].id }}"
  register: media_vm_qm_config
  changed_when: false

- name: Attach media data disk on scsi1 when missing
  ansible.builtin.command: >-
    qm set {{ config.services.vms['media-stack'].id }}
    --{{ config.services.vms['media-stack'].extra_disks[0].interface }}
    {{ config.services.vms['media-stack'].extra_disks[0].datastore_id }}:{{ config.services.vms['media-stack'].extra_disks[0].size_gb }},
    backup={{ 1 if (config.services.vms['media-stack'].extra_disks[0].backup | default(true) | bool) else 0 }},
    discard={{ config.services.vms['media-stack'].extra_disks[0].discard | default('ignore') }}
  when: media_vm_qm_config.stdout is not search('^' ~ config.services.vms['media-stack'].extra_disks[0].interface ~ ':', multiline=True)
  register: media_vm_data_disk_attach

- name: Re-read media VM config from Proxmox
  ansible.builtin.command: "qm config {{ config.services.vms['media-stack'].id }}"
  register: media_vm_qm_config_after_disk
  changed_when: false

- name: Assert media VM data disk is attached on scsi1
  ansible.builtin.assert:
    that:
      - media_vm_qm_config_after_disk.stdout is search('^' ~ config.services.vms['media-stack'].extra_disks[0].interface ~ ':', multiline=True)
    fail_msg: "media-stack data disk attachment did not persist in VM config."

- name: Detect Intel iGPU PCI address on host
  ansible.builtin.shell: |
    set -o pipefail
    lspci -Dnn | awk '/VGA compatible controller.*Intel/{print $1; exit}'
  args:
    executable: /bin/bash
  register: media_igpu_pci
  changed_when: false

- name: Assert Intel iGPU PCI address was detected
  ansible.builtin.assert:
    that:
      - media_igpu_pci.stdout | trim | length > 0
    fail_msg: "Unable to detect Intel iGPU PCI address on Proxmox host."

- name: Configure media VM Intel iGPU passthrough
  ansible.builtin.command: >-
    qm set {{ config.services.vms['media-stack'].id }}
    --hostpci0 {{ media_igpu_pci.stdout | trim }}
  when: media_vm_qm_config_after_disk.stdout is not search('^hostpci0:\\s*' ~ (media_igpu_pci.stdout | trim) ~ '$', multiline=True)
  register: media_vm_hostpci_config

- name: Reboot media VM when hostpci was changed
  ansible.builtin.command: "qm reboot {{ config.services.vms['media-stack'].id }}"
  when: media_vm_hostpci_config is changed
  changed_when: true

- name: Wait for media VM SSH after hostpci change
  ansible.builtin.wait_for:
    host: "{{ config.services.vms['media-stack'].ip }}"
    port: 22
    timeout: 300
    delay: 5
  delegate_to: localhost
  become: false
  when: media_vm_hostpci_config is changed
