- name: Set Heimdall paths
  ansible.builtin.set_fact:
    heimdall_compose_dir: "/docker/docker-compose-{{ inventory_hostname }}"
    heimdall_config_dir: "/docker/docker-compose-{{ inventory_hostname }}/config"
    heimdall_db_path: "/docker/docker-compose-{{ inventory_hostname }}/config/www/app.sqlite"

- name: Install Heimdall automation dependencies
  ansible.builtin.apt:
    name:
      - sqlite3
      - curl
    state: present
    update_cache: true

- name: Create application directory
  ansible.builtin.file:
    path: "{{ heimdall_compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create Heimdall config directory
  ansible.builtin.file:
    path: "{{ heimdall_config_dir }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: '0755'

- name: Copy the Docker Compose file
  ansible.builtin.template:
    src: "docker-compose.yaml.j2"
    dest: "{{ heimdall_compose_dir }}/docker-compose.yaml"
    owner: root
    group: root
    mode: '0644'

- name: Deploy the application via Docker Compose
  ansible.builtin.command:
    cmd: docker compose up -d
  args:
    chdir: "{{ heimdall_compose_dir }}"
  changed_when: false

- name: Wait for Heimdall database
  ansible.builtin.wait_for:
    path: "{{ heimdall_db_path }}"
    timeout: 60

- name: Build Heimdall item list from proxy hosts
  ansible.builtin.set_fact:
    heimdall_items: "{{ heimdall_items | default([]) + [item_entry] }}"
  vars:
    icon_slug_map:
      AdGuard Internal: adguard-home
      NPM: nginx-proxy-manager
      Proxmox: proxmox
      Organizr: organizr
      Heimdall: heimdall
      FreshRSS: freshrss
      NetAlertX: netalertx
      Healthchecks: healthchecks
      CouchDB: couchdb
      Browser: browserless
      Apt Cacher: linux
      Static Sites Internal: nginx
      Authentik Internal: authentik
      Home Assistant: home-assistant
      Nagios: nagios
      Jellyfin: jellyfin
      Router: router
      Plex: plex
      UniFi Primary: unifi
      UniFi Secondary: unifi
      Prowlarr: prowlarr
      Sonarr: sonarr
      Radarr: radarr
      Cleanuparr: cleanuparr
      SABnzbd: sabnzbd
      qBittorrent: qbittorrent
      Raffle Raptor Dev: docker
    icon_slug: "{{ icon_slug_map.get(item.name, 'docker') }}"
    item_entry:
      title: "{{ item.name }}"
      domain: "{{ item.domain }}"
      url: "https://{{ item.domain }}"
      icon: "icons/{{ item.domain }}.png"
      icon_url: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/{{ icon_slug }}.png"
      sql_title: "{{ item.name | replace(\"'\", \"''\") }}"
      sql_url: "{{ ('https://' ~ item.domain) | replace(\"'\", \"''\") }}"
      sql_icon: "{{ ('icons/' ~ item.domain ~ '.png') | replace(\"'\", \"''\") }}"
  loop: "{{ config.npm.proxy_hosts }}"

- name: Ensure Heimdall icon directory exists
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - heimdall
      - mkdir
      - -p
      - /app/www/storage/app/public/icons

- name: Download Heimdall icons for generated items
  ansible.builtin.shell: >-
    docker exec heimdall sh -lc
    "curl -fsSL '{{ item.icon_url }}'
    -o /app/www/storage/app/public/{{ item.icon }}"
  loop: "{{ heimdall_items | default([]) }}"

- name: Check if Heimdall item exists
  ansible.builtin.command: >-
    sqlite3 {{ heimdall_db_path }}
    "SELECT id FROM items WHERE url='{{ item.sql_url }}'
     AND deleted_at IS NULL LIMIT 1;"
  register: heimdall_item_lookup
  changed_when: false
  loop: "{{ heimdall_items | default([]) }}"

- name: Add Heimdall items
  ansible.builtin.command: >-
    sqlite3 {{ heimdall_db_path }}
    "INSERT INTO items
     (title, colour, icon, url, description, pinned, \"order\",
      created_at, updated_at, type, user_id)
     VALUES
     ('{{ item.item.sql_title }}', '', '{{ item.item.sql_icon }}',
      '{{ item.item.sql_url }}', '',
      1, {{ item_index + 1 }},
      datetime('now'), datetime('now'), 0, 1);"
  loop: "{{ heimdall_item_lookup.results | default([]) }}"
  loop_control:
    index_var: item_index
  when: (item.stdout | trim) == ""

- name: Check Heimdall item pin/type
  ansible.builtin.command: >-
    sqlite3 {{ heimdall_db_path }}
    "SELECT pinned || '|' || type || '|' || IFNULL(icon,'')
     FROM items
     WHERE url='{{ item.sql_url }}' AND deleted_at IS NULL
     LIMIT 1;"
  register: heimdall_pin_check
  changed_when: false
  loop: "{{ heimdall_items | default([]) }}"

- name: Ensure Heimdall items are pinned, app-type, and have icons
  ansible.builtin.command: >-
    sqlite3 {{ heimdall_db_path }}
    "UPDATE items
     SET pinned=1, type=0, icon='{{ item.item.sql_icon }}', updated_at=datetime('now')
     WHERE url='{{ item.item.sql_url }}' AND deleted_at IS NULL;"
  loop: "{{ heimdall_pin_check.results | default([]) }}"
  when:
    - (item.stdout | trim) != ""
    - (item.stdout | trim) != ('1|0|' ~ item.item.sql_icon)

- name: Check Heimdall dashboard tag membership
  ansible.builtin.command: >-
    sqlite3 {{ heimdall_db_path }}
    "SELECT COUNT(*)
     FROM item_tag it
     JOIN items i ON i.id = it.item_id
     WHERE i.url='{{ item.sql_url }}'
       AND i.deleted_at IS NULL
       AND it.tag_id=0;"
  register: heimdall_dash_membership
  changed_when: false
  loop: "{{ heimdall_items | default([]) }}"

- name: Ensure generated Heimdall items are on dashboard tag
  ansible.builtin.command: >-
    sqlite3 {{ heimdall_db_path }}
    "INSERT INTO item_tag (item_id, tag_id, created_at, updated_at)
     SELECT i.id, 0, datetime('now'), datetime('now')
     FROM items i
     WHERE i.url='{{ item.item.sql_url }}'
       AND i.deleted_at IS NULL
       AND NOT EXISTS (
         SELECT 1
         FROM item_tag it
         WHERE it.item_id=i.id AND it.tag_id=0
       );"
  loop: "{{ heimdall_dash_membership.results | default([]) }}"
  when: (item.stdout | trim) != "1"
