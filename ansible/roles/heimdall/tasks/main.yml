- name: Set Heimdall paths
  ansible.builtin.set_fact:
    heimdall_compose_dir: "/docker/docker-compose-{{ inventory_hostname }}"
    heimdall_config_dir: "/docker/docker-compose-{{ inventory_hostname }}/config"
    heimdall_db_path: "/docker/docker-compose-{{ inventory_hostname }}/config/www/app.sqlite"

- name: Install Heimdall automation dependencies
  ansible.builtin.apt:
    name:
      - sqlite3
      - curl
    state: present
    update_cache: true

- name: Create application directory
  ansible.builtin.file:
    path: "{{ heimdall_compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create Heimdall config directory
  ansible.builtin.file:
    path: "{{ heimdall_config_dir }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: '0755'

- name: Copy the Docker Compose file
  ansible.builtin.template:
    src: "docker-compose.yaml.j2"
    dest: "{{ heimdall_compose_dir }}/docker-compose.yaml"
    owner: root
    group: root
    mode: '0644'

- name: Deploy the application via Docker Compose
  ansible.builtin.command:
    cmd: docker compose up -d
  args:
    chdir: "{{ heimdall_compose_dir }}"
  changed_when: false

- name: Wait for Heimdall database
  ansible.builtin.wait_for:
    path: "{{ heimdall_db_path }}"
    timeout: 60

- name: Define Heimdall excluded domains
  ansible.builtin.set_fact:
    heimdall_excluded_domains:
      - heimdall.laxdog.uk
      - couchdb.laxdog.uk
      - obsidian-api.laxdog.uk
      - sites.laxdog.uk

- name: Build Heimdall item list from proxy hosts
  ansible.builtin.set_fact:
    heimdall_items: "{{ heimdall_items | default([]) + [item_entry] }}"
  vars:
    default_icon_slug_map:
      AdGuard Internal: adguard-home
      NPM: nginx-proxy-manager
      Proxmox: proxmox
      Organizr: organizr
      FreshRSS: freshrss
      NetAlertX: netalertx
      Healthchecks: healthchecks
      Firefox: firefox
      Apt Cacher: linux
      Authentik Internal: authentik
      Home Assistant: home-assistant
      Nagios: nagios
      Jellyfin: jellyfin
      Router: asus-router
      Plex: plex
      Liberty: unifi
      Ellis: unifi
      Prowlarr: prowlarr
      Sonarr: sonarr
      Radarr: radarr
      Bazarr: bazarr
      Cleanuparr: cleanuparr
      SABnzbd: sabnzbd
      qBittorrent: qbittorrent
      Raffle Raptor Dev: docker
    icon_slug_map: "{{ default_icon_slug_map | combine(config.heimdall.icon_slug_map | default({})) }}"
    item_override: "{{ (config.heimdall.icon_overrides | default({})).get(item.name, (config.heimdall.icon_overrides | default({})).get(item.domain, {})) }}"
    icon_slug: "{{ item_override.icon_slug | default(icon_slug_map.get(item.name, 'docker')) }}"
    icon_emoji: "{{ item_override.icon_emoji | default('') }}"
    icon_url: "{{ item_override.icon_url | default('https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/' ~ icon_slug ~ '.png') }}"
    icon_ext: "{{ 'svg' if (icon_emoji | length > 0) else 'png' }}"
    item_entry:
      title: "{{ item.name }}"
      domain: "{{ item.domain }}"
      url: "https://{{ item.domain }}"
      icon: "icons/{{ item.domain }}.{{ icon_ext }}"
      icon_url: "{{ icon_url }}"
      icon_emoji: "{{ icon_emoji }}"
      sql_title: "{{ item.name | replace(\"'\", \"''\") }}"
      sql_url: "{{ ('https://' ~ item.domain) | replace(\"'\", \"''\") }}"
      sql_icon: "{{ ('icons/' ~ item.domain ~ '.' ~ icon_ext) | replace(\"'\", \"''\") }}"
  loop: "{{ config.npm.proxy_hosts }}"
  when: item.domain not in heimdall_excluded_domains

- name: Build Heimdall extra items from config
  ansible.builtin.set_fact:
    heimdall_items: "{{ heimdall_items | default([]) + [item_entry] }}"
  vars:
    item_domain: >-
      {{ item.url
         | regex_replace('^https?://', '')
         | regex_replace('/.*$', '') }}
    item_override: "{{ (config.heimdall.icon_overrides | default({})).get(item.title, (config.heimdall.icon_overrides | default({})).get(item_domain, {})) }}"
    icon_emoji: "{{ item.icon_emoji | default(item_override.icon_emoji | default('')) }}"
    icon_url: "{{ item.icon_url | default(item_override.icon_url | default('https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/docker.png')) }}"
    icon_ext: "{{ 'svg' if (icon_emoji | length > 0) else 'png' }}"
    item_entry:
      title: "{{ item.title }}"
      domain: "{{ item_domain }}"
      url: "{{ item.url }}"
      icon: "icons/{{ item_domain }}.{{ icon_ext }}"
      icon_url: "{{ icon_url }}"
      icon_emoji: "{{ icon_emoji }}"
      sql_title: "{{ item.title | replace(\"'\", \"''\") }}"
      sql_url: "{{ item.url | replace(\"'\", \"''\") }}"
      sql_icon: "{{ ('icons/' ~ item_domain ~ '.' ~ icon_ext) | replace(\"'\", \"''\") }}"
  loop: "{{ config.heimdall.extra_items | default([]) }}"

- name: Ensure Heimdall icon directory exists
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - heimdall
      - mkdir
      - -p
      - /app/www/storage/app/public/icons

- name: Download Heimdall icons for generated items
  ansible.builtin.shell: >-
    docker exec heimdall sh -lc
    "curl -fsSL '{{ item.icon_url }}'
    -o /app/www/storage/app/public/{{ item.icon }}"
  loop: "{{ heimdall_items | default([]) }}"
  when: (item.icon_emoji | default('') | length) == 0

- name: Generate Heimdall emoji icons for generated items
  ansible.builtin.shell: |
    docker exec heimdall sh -lc 'cat > /app/www/storage/app/public/{{ item.icon }} <<'"'"'SVG'"'"'
    <svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
      <rect width="512" height="512" rx="96" fill="#f4f1e8"/>
      <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle"
            font-size="300"
            font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif">{{ item.icon_emoji }}</text>
    </svg>
    SVG'
  loop: "{{ heimdall_items | default([]) }}"
  when: (item.icon_emoji | default('') | length) > 0

- name: Check if Heimdall item exists
  ansible.builtin.command: >-
    sqlite3 {{ heimdall_db_path }}
    "SELECT id FROM items WHERE url='{{ item.sql_url }}'
     AND deleted_at IS NULL LIMIT 1;"
  register: heimdall_item_lookup
  changed_when: false
  loop: "{{ heimdall_items | default([]) }}"

- name: Add Heimdall items
  ansible.builtin.command: >-
    sqlite3 {{ heimdall_db_path }}
    "INSERT INTO items
     (title, colour, icon, url, description, pinned, \"order\",
      created_at, updated_at, type, user_id)
     VALUES
     ('{{ item.item.sql_title }}', '', '{{ item.item.sql_icon }}',
      '{{ item.item.sql_url }}', '',
      1, {{ item_index + 1 }},
      datetime('now'), datetime('now'), 0, 1);"
  loop: "{{ heimdall_item_lookup.results | default([]) }}"
  loop_control:
    index_var: item_index
  when: (item.stdout | trim) == ""

- name: Check Heimdall item pin/type
  ansible.builtin.command: >-
    sqlite3 {{ heimdall_db_path }}
    "SELECT IFNULL(title,'') || '|' || pinned || '|' || type || '|' || IFNULL(icon,'')
     FROM items
     WHERE url='{{ item.sql_url }}' AND deleted_at IS NULL
     LIMIT 1;"
  register: heimdall_pin_check
  changed_when: false
  loop: "{{ heimdall_items | default([]) }}"

- name: Ensure Heimdall items are pinned, app-type, and have icons
  ansible.builtin.command: >-
    sqlite3 {{ heimdall_db_path }}
    "UPDATE items
     SET title='{{ item.item.sql_title }}', pinned=1, type=0, icon='{{ item.item.sql_icon }}', updated_at=datetime('now')
     WHERE url='{{ item.item.sql_url }}' AND deleted_at IS NULL;"
  loop: "{{ heimdall_pin_check.results | default([]) }}"
  when:
    - (item.stdout | trim) != ""
    - (item.stdout | trim) != (item.item.sql_title ~ '|1|0|' ~ item.item.sql_icon)

- name: Check Heimdall dashboard tag membership
  ansible.builtin.command: >-
    sqlite3 {{ heimdall_db_path }}
    "SELECT COUNT(*)
     FROM item_tag it
     JOIN items i ON i.id = it.item_id
     WHERE i.url='{{ item.sql_url }}'
       AND i.deleted_at IS NULL
       AND it.tag_id=0;"
  register: heimdall_dash_membership
  changed_when: false
  loop: "{{ heimdall_items | default([]) }}"

- name: Ensure generated Heimdall items are on dashboard tag
  ansible.builtin.command: >-
    sqlite3 {{ heimdall_db_path }}
    "INSERT INTO item_tag (item_id, tag_id, created_at, updated_at)
     SELECT i.id, 0, datetime('now'), datetime('now')
     FROM items i
     WHERE i.url='{{ item.item.sql_url }}'
       AND i.deleted_at IS NULL
       AND NOT EXISTS (
         SELECT 1
         FROM item_tag it
         WHERE it.item_id=i.id AND it.tag_id=0
       );"
  loop: "{{ heimdall_dash_membership.results | default([]) }}"
  when: (item.stdout | trim) != "1"

- name: Remove excluded items from Heimdall dashboard pin view
  ansible.builtin.command: >-
    sqlite3 {{ heimdall_db_path }}
    "UPDATE items
     SET pinned=0, updated_at=datetime('now')
     WHERE url='https://{{ item }}'
       AND deleted_at IS NULL;"
  loop: "{{ heimdall_excluded_domains }}"

- name: Remove excluded items from Heimdall dashboard tag
  ansible.builtin.command: >-
    sqlite3 {{ heimdall_db_path }}
    "DELETE FROM item_tag
     WHERE tag_id=0
       AND item_id IN (
         SELECT id
         FROM items
         WHERE url='https://{{ item }}'
           AND deleted_at IS NULL
       );"
  loop: "{{ heimdall_excluded_domains }}"
