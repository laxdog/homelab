---
- name: Set Authentik paths
  ansible.builtin.set_fact:
    authentik_compose_dir: "/docker/docker-compose-{{ inventory_hostname }}"
    authentik_ldap_enabled: "{{ config.authentik.ldap.enabled | default(false) | bool }}"

- name: Create Authentik application directory
  ansible.builtin.file:
    path: "{{ authentik_compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Ensure Authentik media and template directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: '0755'
  loop:
    - "{{ authentik_compose_dir }}/media"
    - "{{ authentik_compose_dir }}/templates"

- name: Ensure Authentik scripts directory exists
  ansible.builtin.file:
    path: "{{ authentik_compose_dir }}/scripts"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Write Authentik environment file
  ansible.builtin.template:
    src: authentik.env.j2
    dest: "{{ authentik_compose_dir }}/.env"
    owner: root
    group: root
    mode: '0600'
  no_log: true

- name: Write Authentik SSO setup script
  ansible.builtin.template:
    src: authentik_sso_setup.py.j2
    dest: "{{ authentik_compose_dir }}/scripts/authentik_sso_setup.py"
    owner: root
    group: root
    mode: '0755'

- name: Write Authentik LDAP export script
  ansible.builtin.template:
    src: authentik_ldap_export.py.j2
    dest: "{{ authentik_compose_dir }}/scripts/authentik_ldap_export.py"
    owner: root
    group: root
    mode: '0755'
  when: authentik_ldap_enabled

- name: Write Authentik readiness check script
  ansible.builtin.copy:
    dest: "{{ authentik_compose_dir }}/scripts/authentik_wait.py"
    owner: root
    group: root
    mode: '0755'
    content: |
      import sys
      import time
      import urllib.request

      for _ in range(30):
          try:
              urllib.request.urlopen("http://127.0.0.1:9000/api/v3/root/config/", timeout=2)
              sys.exit(0)
          except Exception:
              time.sleep(2)
      sys.exit(1)

- name: Remove Authentik LDAP outpost env file when LDAP is disabled
  ansible.builtin.file:
    path: "{{ authentik_compose_dir }}/ldap-outpost.env"
    state: absent
  when: not authentik_ldap_enabled

- name: Remove Authentik LDAP CA export when LDAP is disabled
  ansible.builtin.file:
    path: "{{ authentik_compose_dir }}/ldap-ca.pem"
    state: absent
  when: not authentik_ldap_enabled

- name: Write initial Authentik Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yaml.j2
    dest: "{{ authentik_compose_dir }}/docker-compose.yaml"
    owner: root
    group: root
    mode: '0644'

- name: Deploy Authentik core services via Docker Compose
  ansible.builtin.command:
    cmd: docker compose up -d
  args:
    chdir: "{{ authentik_compose_dir }}"
  changed_when: false

- name: Check Authentik server port mapping
  ansible.builtin.command:
    cmd: >-
      docker inspect -f '{% raw %}{{ with (index .NetworkSettings.Ports "9000/tcp") }}{{ if . }}{{ (index . 0).HostPort }}{{ end }}{{ end }}{% endraw %}'
      authentik-server
  register: authentik_port
  changed_when: false
  failed_when: false

- name: Recreate Authentik containers when port mapping missing
  ansible.builtin.command:
    cmd: docker compose up -d --force-recreate
  args:
    chdir: "{{ authentik_compose_dir }}"
  when: authentik_port.stdout | trim != '9000'
  changed_when: true

- name: Remove deprecated Authentik blueprints directory
  ansible.builtin.file:
    path: "{{ authentik_compose_dir }}/blueprints"
    state: absent

- name: Wait for Authentik to be ready
  ansible.builtin.command:
    cmd: docker exec authentik-server /bin/sh -lc '/ak-root/venv/bin/python /scripts/authentik_wait.py'
  changed_when: false

- name: Apply Authentik SSO configuration
  ansible.builtin.command:
    cmd: >-
      timeout 300 docker exec authentik-server /bin/sh -lc
      'cd /authentik && /ak-root/venv/bin/python /scripts/authentik_sso_setup.py'
  register: authentik_sso_apply
  changed_when: false
  failed_when: authentik_sso_apply.rc != 0

- name: Export Authentik LDAP outpost runtime material
  ansible.builtin.command:
    cmd: >-
      docker exec authentik-server /bin/sh -lc
      'cd /authentik && /ak-root/venv/bin/python /scripts/authentik_ldap_export.py'
  register: authentik_ldap_export
  changed_when: false
  no_log: true
  when: authentik_ldap_enabled

- name: Parse Authentik LDAP export payload
  ansible.builtin.set_fact:
    authentik_ldap_export_json: "{{ authentik_ldap_export.stdout | from_json }}"
    authentik_ldap_outpost_token: "{{ (authentik_ldap_export.stdout | from_json).outpost_token }}"
  no_log: true
  when: authentik_ldap_enabled

- name: Write Authentik LDAP outpost environment file
  ansible.builtin.copy:
    dest: "{{ authentik_compose_dir }}/ldap-outpost.env"
    owner: root
    group: root
    mode: '0600'
    content: |
      AUTHENTIK_HOST=http://server:9000
      AUTHENTIK_TOKEN={{ authentik_ldap_outpost_token }}
      AUTHENTIK_HOST_BROWSER=
  no_log: true
  when: authentik_ldap_enabled

- name: Write Authentik LDAP CA export
  ansible.builtin.copy:
    dest: "{{ authentik_compose_dir }}/ldap-ca.pem"
    owner: root
    group: root
    mode: '0644'
    content: "{{ authentik_ldap_export_json.certificate_pem | trim }}\n"
  when:
    - authentik_ldap_enabled
    - authentik_ldap_export_json.certificate_pem | length > 0

- name: Write final Authentik Docker Compose file with LDAP outpost
  ansible.builtin.template:
    src: docker-compose.yaml.j2
    dest: "{{ authentik_compose_dir }}/docker-compose.yaml"
    owner: root
    group: root
    mode: '0644'
  when: authentik_ldap_enabled

- name: Deploy Authentik LDAP outpost via Docker Compose
  ansible.builtin.command:
    cmd: docker compose up -d
  args:
    chdir: "{{ authentik_compose_dir }}"
  changed_when: false
  when: authentik_ldap_enabled
