---
- name: Wait for NPM API to be reachable
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 81
    timeout: 30

- name: Normalize NPM advanced_config newlines in database
  ansible.builtin.command:
    cmd: >-
      /bin/sh -lc
      "docker run --rm -v /docker/nginx-proxy-manager:/data nouchka/sqlite3
      /data/database.sqlite
      \"UPDATE proxy_host
      SET advanced_config = replace(advanced_config, char(92) || 'n', char(10))
      WHERE advanced_config LIKE '%' || char(92) || 'n%';
      SELECT changes();\""
  register: npm_advanced_config_normalize
  changed_when: npm_advanced_config_normalize.stdout | trim | int > 0

- name: Normalize escaped newlines in NPM proxy host files
  ansible.builtin.command:
    cmd: |
      /bin/sh -lc 'cat > /tmp/npm_fix.py << "PY"
      from pathlib import Path
      root = Path("/docker/nginx-proxy-manager/nginx/proxy_host")
      changed = False
      for path in root.glob("*.conf"):
          data = path.read_text()
          if "\\n" in data:
              path.write_text(data.replace("\\n", "\n"))
              changed = True
      print("changed" if changed else "ok")
      PY
      python3 /tmp/npm_fix.py
      rm -f /tmp/npm_fix.py'
  register: npm_proxy_host_normalize
  changed_when: "'changed' in npm_proxy_host_normalize.stdout"

- name: Reload NPM after proxy host normalization
  ansible.builtin.command:
    cmd: docker exec nginx-proxy-manager nginx -s reload
  when: npm_proxy_host_normalize.changed

- name: Login to NPM API with automation credentials
  ansible.builtin.uri:
    url: http://127.0.0.1:81/api/tokens
    method: POST
    body_format: json
    body:
      identity: "{{ config.npm.api_email }}"
      secret: "{{ npm_api_password }}"
  register: npm_login_api
  retries: 12
  delay: 5
  until: npm_login_api.status is defined and npm_login_api.status != 502
  failed_when: false

- name: Login to NPM API with admin credentials
  ansible.builtin.uri:
    url: http://127.0.0.1:81/api/tokens
    method: POST
    body_format: json
    body:
      identity: "{{ config.npm.admin_email }}"
      secret: "{{ npm_admin_password }}"
  register: npm_login_admin
  retries: 12
  delay: 5
  until: npm_login_admin.status is defined and npm_login_admin.status != 502
  when: npm_login_api.status is not defined or npm_login_api.status not in [200, 201]

- name: Select NPM API token
  ansible.builtin.set_fact:
    npm_api_token: >-
      {{ (npm_login_api.json.token
          if (npm_login_api.status is defined and npm_login_api.status in [200, 201])
          else npm_login_admin.json.token) }}

- name: Store NPM admin token when available
  ansible.builtin.set_fact:
    npm_admin_token: "{{ npm_login_admin.json.token }}"
  when:
    - npm_login_admin is defined
    - npm_login_admin.status is defined and npm_login_admin.status in [200, 201]

- name: Read NPM users with admin token
  ansible.builtin.uri:
    url: http://127.0.0.1:81/api/users
    method: GET
    headers:
      Authorization: "Bearer {{ npm_admin_token }}"
  register: npm_users
  when: npm_admin_token is defined

- name: Normalize NPM users response
  ansible.builtin.set_fact:
    npm_user_items: >-
      {{ (npm_users.json.data | default(npm_users.json))
         if (npm_users is defined and npm_users.json is defined)
         else [] }}

- name: Resolve automation user
  ansible.builtin.set_fact:
    npm_automation_user: >-
      {{ (npm_user_items
          | selectattr('email', 'equalto', config.npm.api_email)
          | list
          | first) | default({}) }}
  when: npm_users is defined

- name: Create automation user when missing
  ansible.builtin.uri:
    url: http://127.0.0.1:81/api/users
    method: POST
    status_code: [200, 201]
    body_format: json
    headers:
      Authorization: "Bearer {{ npm_admin_token }}"
    body:
      name: "Automation"
      nickname: "Automation"
      email: "{{ config.npm.api_email }}"
      roles:
        - admin
      auth:
        type: password
        secret: "{{ npm_api_password }}"
  when:
    - npm_admin_token is defined
    - npm_automation_user | length == 0

- name: Login to NPM API with automation credentials (post-create)
  ansible.builtin.uri:
    url: http://127.0.0.1:81/api/tokens
    method: POST
    body_format: json
    body:
      identity: "{{ config.npm.api_email }}"
      secret: "{{ npm_api_password }}"
  register: npm_login_api_post
  retries: 12
  delay: 5
  until: npm_login_api_post.status is defined and npm_login_api_post.status != 502
  when:
    - npm_login_api.status is not defined or npm_login_api.status not in [200, 201]
    - npm_users is defined

- name: Update NPM API token after automation login
  ansible.builtin.set_fact:
    npm_api_token: "{{ npm_login_api_post.json.token }}"
  when:
    - npm_login_api_post is defined
    - npm_login_api_post.status is defined and npm_login_api_post.status in [200, 201]

- name: Assert NPM API token available
  ansible.builtin.assert:
    that:
      - npm_api_token is defined
      - npm_api_token | length > 0
    fail_msg: "Unable to authenticate to NPM API; update npm.admin_email/npm_admin_password."

- name: Build effective proxy host list
  ansible.builtin.set_fact:
    npm_proxy_hosts_effective: >-
      {{ config.npm.proxy_hosts
         + ((config.npm.external_proxy_hosts | default([]))
            if (config.npm.external_enabled | default(false)) else []) }}

- name: Build Authentik forward-auth snippet
  ansible.builtin.set_fact:
    authentik_forward_auth_snippet: "{{ lookup('template', 'authentik_forward_auth.conf.j2') }}"

- name: Read existing NPM access lists
  ansible.builtin.uri:
    url: http://127.0.0.1:81/api/nginx/access-lists
    method: GET
    headers:
      Authorization: "Bearer {{ npm_api_token }}"
  register: npm_access_lists

- name: Normalize access list response
  ansible.builtin.set_fact:
    npm_access_list_items: "{{ npm_access_lists.json.data | default(npm_access_lists.json) }}"

- name: Initialize access list map
  ansible.builtin.set_fact:
    npm_access_list_map: {}

- name: Initialize certificate map
  ansible.builtin.set_fact:
    npm_certificate_map: {}

- name: Ensure access lists exist
  ansible.builtin.include_tasks: access-list.yml
  loop: "{{ config.npm.access_lists }}"
  loop_control:
    loop_var: access_list

- name: Assert access list map populated
  ansible.builtin.assert:
    that:
      - npm_access_list_map | length > 0
    fail_msg: "No NPM access lists available after provisioning."

- name: Assert proxy host access lists exist
  ansible.builtin.assert:
    that:
      - npm_access_list_map[item.access_list] is defined
    fail_msg: "Access list '{{ item.access_list }}' not defined for {{ item.domain }}."
  loop: "{{ npm_proxy_hosts_effective }}"

- name: Read existing NPM certificates
  ansible.builtin.uri:
    url: http://127.0.0.1:81/api/nginx/certificates
    method: GET
    headers:
      Authorization: "Bearer {{ npm_api_token }}"
  register: npm_certificates

- name: Normalize certificate response
  ansible.builtin.set_fact:
    npm_certificate_items: "{{ npm_certificates.json.data | default(npm_certificates.json) }}"

- name: Build certificate map by name
  ansible.builtin.set_fact:
    npm_certificate_map: >-
      {{ dict(npm_certificate_items | map(attribute='nice_name') | list
         | zip(npm_certificate_items | map(attribute='id') | list)) }}

- name: Build certificate map by domain set
  ansible.builtin.set_fact:
    npm_certificate_domains_map: >-
      {{ npm_certificate_domains_map | default({}) | combine({
         (item.domain_names | sort | join(',')): item.id
      }) }}
  loop: "{{ npm_certificate_items }}"
  when: item.domain_names is defined

- name: Build certificate config map
  ansible.builtin.set_fact:
    npm_certificate_config_map: >-
      {{ dict((config.npm.certificates | default([])) | map(attribute='name') | list
         | zip(config.npm.certificates | default([]))) }}

- name: Ensure certificates exist
  ansible.builtin.include_tasks: certificate.yml
  loop: "{{ config.npm.certificates | default([]) }}"
  loop_control:
    loop_var: certificate
  no_log: true

- name: Refresh certificate list after creation
  ansible.builtin.uri:
    url: http://127.0.0.1:81/api/nginx/certificates
    method: GET
    headers:
      Authorization: "Bearer {{ npm_api_token }}"
  register: npm_certificates_refresh
  when: config.npm.certificates | default([]) | length > 0

- name: Update certificate map after creation
  ansible.builtin.set_fact:
    npm_certificate_map: >-
      {{ dict((npm_certificates_refresh.json.data | default(npm_certificates_refresh.json))
         | map(attribute='nice_name') | list
         | zip((npm_certificates_refresh.json.data | default(npm_certificates_refresh.json))
         | map(attribute='id') | list)) }}
  when: config.npm.certificates | default([]) | length > 0

- name: Update certificate domain map after creation
  ansible.builtin.set_fact:
    npm_certificate_domains_map: >-
      {{ dict((npm_certificates_refresh.json.data | default(npm_certificates_refresh.json))
         | selectattr('domain_names', 'defined')
         | map(attribute='domain_names')
         | map('sort')
         | map('join', ',')
         | list
         | zip((npm_certificates_refresh.json.data | default(npm_certificates_refresh.json))
         | selectattr('domain_names', 'defined')
         | map(attribute='id')
         | list)) }}
  when: config.npm.certificates | default([]) | length > 0

- name: Read existing NPM proxy hosts
  ansible.builtin.uri:
    url: http://127.0.0.1:81/api/nginx/proxy-hosts
    method: GET
    headers:
      Authorization: "Bearer {{ npm_api_token }}"
  register: npm_proxy_hosts

- name: Normalize proxy host response
  ansible.builtin.set_fact:
    npm_proxy_host_items: "{{ npm_proxy_hosts.json.data | default(npm_proxy_hosts.json) }}"

- name: Remove unwanted proxy hosts
  ansible.builtin.uri:
    url: "http://127.0.0.1:81/api/nginx/proxy-hosts/{{ current_host.id }}"
    method: DELETE
    status_code: [200, 204]
    headers:
      Authorization: "Bearer {{ npm_api_token }}"
  loop: "{{ config.npm.remove_proxy_hosts | default([]) }}"
  vars:
    current_host: >-
      {{ (npm_proxy_host_items
          | selectattr('domain_names', 'contains', item)
          | list
          | first) | default({}) }}
  when: current_host | length > 0

- name: Update proxy host when needed
  ansible.builtin.uri:
    url: "http://127.0.0.1:81/api/nginx/proxy-hosts/{{ current_host.id }}"
    method: PUT
    body_format: json
    status_code: [200, 201]
    headers:
      Authorization: "Bearer {{ npm_api_token }}"
    body:
      domain_names:
        - "{{ item.domain }}"
      forward_scheme: "{{ item.forward_scheme | default('http') }}"
      forward_host: "{{ item.forward_host }}"
      forward_port: "{{ item.forward_port }}"
      access_list_id: "{{ desired_access_list_id }}"
      allow_websocket_upgrade: true
      block_exploits: true
      caching_enabled: false
      certificate_id: "{{ desired_certificate_id }}"
      ssl_forced: "{{ desired_ssl_forced }}"
      http2_support: "{{ desired_http2_support }}"
      hsts_enabled: "{{ current_host.hsts_enabled | default(false) }}"
      hsts_subdomains: "{{ current_host.hsts_subdomains | default(false) }}"
      advanced_config: "{{ desired_advanced_config }}"
      meta: "{{ current_host.meta | default({'letsencrypt_agree': false, 'dns_challenge': false, 'letsencrypt_email': ''}) }}"
      locations: "{{ current_host.locations | default([], true) }}"
  loop: "{{ npm_proxy_hosts_effective }}"
  vars:
    current_host: >-
      {{ (npm_proxy_host_items
          | selectattr('domain_names', 'contains', item.domain)
          | list
          | first) | default({}) }}
    desired_access_list_id: "{{ npm_access_list_map[item.access_list] }}"
    desired_certificate_id: >-
      {% if item.ssl | default(false) and item.certificate is defined %}
      {% set cert_cfg = (npm_certificate_config_map[item.certificate] | default({})) %}
      {% if cert_cfg and cert_cfg.type == 'letsencrypt' %}
      {{ npm_certificate_domains_map[(cert_cfg.domains | sort | join(','))] | default(0) }}
      {% else %}
      {{ npm_certificate_map[item.certificate] | default(0) }}
      {% endif %}
      {% else %}
      0
      {% endif %}
    desired_ssl_forced: "{{ item.ssl | default(false) }}"
    desired_http2_support: "{{ item.ssl | default(false) }}"
    desired_forward_scheme: "{{ item.forward_scheme | default('http') }}"
    desired_advanced_config: |
      {% set base_config = (item.advanced_config | default('')) | replace('\\n', '\n') | trim %}
      {% if item.authentik_protect | default(false) %}
      {{ base_config }}
      {{ authentik_forward_auth_snippet | trim }}
      {% else %}
      {{ base_config }}
      {% endif %}
    needs_update: >-
      {{ (current_host.access_list_id | default(0)) != desired_access_list_id
         or (current_host.certificate_id | default(0)) != desired_certificate_id
         or (current_host.ssl_forced | default(false)) != desired_ssl_forced
         or (current_host.http2_support | default(false)) != desired_http2_support
         or (current_host.forward_scheme | default('http')) != desired_forward_scheme
         or (current_host.forward_host | default('')) != item.forward_host
         or (current_host.forward_port | default(0) | int) != (item.forward_port | int)
         or (current_host.advanced_config | default('')) != desired_advanced_config
         or (current_host.meta.nginx_online is defined and not current_host.meta.nginx_online)
         or (npm_certificates_changed | default(false)) }}
  when:
    - current_host | length > 0
    - needs_update

- name: Create AdGuard proxy host when missing
  ansible.builtin.uri:
    url: http://127.0.0.1:81/api/nginx/proxy-hosts
    method: POST
    body_format: json
    status_code: [200, 201]
    headers:
      Authorization: "Bearer {{ npm_api_token }}"
    body:
      domain_names:
        - "{{ item.domain }}"
      forward_scheme: "{{ item.forward_scheme | default('http') }}"
      forward_host: "{{ item.forward_host }}"
      forward_port: "{{ item.forward_port }}"
      access_list_id: "{{ npm_access_list_map[item.access_list] }}"
      allow_websocket_upgrade: true
      block_exploits: true
      caching_enabled: false
      certificate_id: "{{ desired_certificate_id }}"
      ssl_forced: "{{ item.ssl | default(false) }}"
      http2_support: "{{ item.ssl | default(false) }}"
      hsts_enabled: false
      hsts_subdomains: false
      advanced_config: |
        {% set base_config = (item.advanced_config | default('')) | replace('\\n', '\n') | trim %}
        {% if item.authentik_protect | default(false) %}
        {{ base_config }}
        {{ authentik_forward_auth_snippet | trim }}
        {% else %}
        {{ base_config }}
        {% endif %}
      meta:
        letsencrypt_agree: false
        dns_challenge: false
        letsencrypt_email: ""
      locations: []
  loop: "{{ npm_proxy_hosts_effective }}"
  vars:
    desired_certificate_id: >-
      {% if item.ssl | default(false) and item.certificate is defined %}
      {% set cert_cfg = (npm_certificate_config_map[item.certificate] | default({})) %}
      {% if cert_cfg and cert_cfg.type == 'letsencrypt' %}
      {{ npm_certificate_domains_map[(cert_cfg.domains | sort | join(','))] | default(0) }}
      {% else %}
      {{ npm_certificate_map[item.certificate] | default(0) }}
      {% endif %}
      {% else %}
      0
      {% endif %}
  when: >-
    (npm_proxy_host_items
      | selectattr('domain_names', 'contains', item.domain)
      | list
      | length) == 0
