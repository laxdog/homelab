---
- name: Install media foundation packages
  ansible.builtin.apt:
    name:
      - e2fsprogs
      - gdisk
      - linux-modules-extra-{{ ansible_kernel }}
    state: present
    update_cache: true
  register: media_foundation_packages

- name: Reboot media host when kernel extra modules were installed
  ansible.builtin.reboot:
    reboot_timeout: 600
    test_command: whoami
  when: media_foundation_packages.changed

- name: Ensure appdata directory exists on root disk
  ansible.builtin.file:
    path: "{{ config.media_stack.appdata_path }}"
    state: directory
    mode: "0755"

- name: Ensure data mount root exists
  ansible.builtin.file:
    path: "{{ config.media_stack.data_mount_path }}"
    state: directory
    mode: "0755"

- name: Verify virtiofs data mounts are active
  ansible.builtin.command: "findmnt -n -o FSTYPE {{ item.mountpoint }}"
  register: media_data_mounts
  changed_when: false
  failed_when: false
  loop: "{{ config.media_stack.data_mounts }}"

- name: Assert all virtiofs data mounts are present
  ansible.builtin.assert:
    that:
      - item.rc == 0
      - item.stdout | trim == 'virtiofs'
    fail_msg: >-
      Expected virtiofs mount at {{ item.item.mountpoint }}
      (tag {{ item.item.tag }}) but found {{ item.stdout | default('nothing') | trim }}.
      Verify Proxmox virtiofs share config for VM120.
  loop: "{{ media_data_mounts.results }}"
  loop_control:
    label: "{{ item.item.mountpoint }}"

- name: Ensure media data layout directories exist
  ansible.builtin.file:
    path: "{{ config.media_stack.data_mount_path }}/{{ item }}"
    state: directory
    owner: "{{ config.media_stack.shared_ids.uid }}"
    group: "{{ config.media_stack.shared_ids.gid }}"
    mode: "0775"
  loop: "{{ config.media_stack.data_layout }}"

- name: Load i915 module for Intel iGPU
  ansible.builtin.command: modprobe i915
  changed_when: false

- name: Ensure i915 module loads on boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/media-igpu.conf
    mode: "0644"
    content: |
      i915

- name: Verify Intel render node is present
  ansible.builtin.stat:
    path: /dev/dri/renderD128
  register: media_render_node

- name: Assert Intel render node is available for Docker
  ansible.builtin.assert:
    that:
      - media_render_node.stat.exists
      - media_render_node.stat.ischr | default(false)
    fail_msg: >-
      /dev/dri/renderD128 is not available on media-stack.
      Verify host PCI passthrough and guest kernel modules.
