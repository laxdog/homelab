---
- name: Resolve remote node config
  ansible.builtin.set_fact:
    remote_node_cfg: "{{ (config.remote_nodes | default({})).get('nodes', {}).get(inventory_hostname, {}) }}"

- name: Resolve remote-node WiFi network catalog
  ansible.builtin.set_fact:
    remote_node_wifi_networks: "{{ (config.remote_nodes.wifi_networks | default([])) + (remote_node_cfg.wifi_networks | default([])) }}"

- name: Resolve configured remote-node WiFi SSID names
  ansible.builtin.set_fact:
    remote_node_wifi_ssids: "{{ remote_node_wifi_networks | map(attribute='ssid') | list }}"

- name: Determine desired hostname
  ansible.builtin.set_fact:
    remote_node_desired_hostname: "{{ remote_node_cfg.hostname | default(inventory_hostname) }}"

- name: Validate desired hostname format
  ansible.builtin.assert:
    that:
      - remote_node_desired_hostname is match('^[a-z0-9][a-z0-9-]{0,62}[a-z0-9]$')
    fail_msg: "remote node hostname '{{ remote_node_desired_hostname }}' must be lowercase RFC-1123 compatible."

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ remote_node_desired_hostname }}"

- name: Ensure /etc/hosts has current hostname mapping
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s+'
    line: "127.0.1.1 {{ remote_node_desired_hostname }}"
    state: present

- name: Install remote-node baseline packages
  ansible.builtin.apt:
    name:
      - openssh-server
      - unattended-upgrades
      - apt-listchanges
      - uptimed
      - jq
      - curl
      - network-manager
    state: present
    update_cache: true

- name: Disable WiFi power saving for unattended remote nodes
  ansible.builtin.copy:
    dest: /etc/NetworkManager/conf.d/99-remote-node-wifi-powersave.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      [connection]
      wifi.powersave=2
  notify: Restart NetworkManager

- name: Ensure OpenSSH service is enabled and running
  ansible.builtin.service:
    name: ssh
    enabled: true
    state: started

- name: Deploy Nagios VM133 SSH public key for check_by_ssh
  ansible.posix.authorized_key:
    user: "{{ remote_node_cfg.ssh_user | default('mrobinson') }}"
    key: "{{ lookup('file', role_path ~ '/files/nagios_id_ed25519.pub') }}"
    state: present
    comment: "nagios@vm133 — for Nagios check_by_ssh monitoring"

- name: Find WiFi interface name
  ansible.builtin.shell: |
    set -o pipefail
    nmcli -t -f DEVICE,TYPE,STATE device status | awk -F: '$2=="wifi"{print $1; exit}'
  args:
    executable: /bin/bash
  register: remote_node_wifi_iface
  changed_when: false

- name: Assert WiFi interface exists
  ansible.builtin.assert:
    that:
      - remote_node_wifi_iface.stdout | trim | length > 0
    fail_msg: "No WiFi interface detected for remote node baseline."

- name: Assert vaulted PSKs exist for configured WiFi networks
  ansible.builtin.assert:
    that:
      - lookup('vars', item.password_var, default='') | length > 0
    fail_msg: "Missing vaulted WiFi secret '{{ item.password_var }}' for SSID '{{ item.ssid }}'."
  loop: "{{ remote_node_wifi_networks | rejectattr('open', 'defined') | list + (remote_node_wifi_networks | selectattr('open', 'defined') | rejectattr('open', 'equalto', true) | list) }}"
  loop_control:
    label: "{{ item.ssid }}"

- name: Check if configured WiFi network profiles exist
  ansible.builtin.command:
    argv:
      - nmcli
      - -g
      - connection.id
      - connection
      - show
      - "{{ item.ssid }}"
  loop: "{{ remote_node_wifi_networks }}"
  loop_control:
    label: "{{ item.ssid }}"
  register: remote_node_wifi_profile_checks
  changed_when: false
  failed_when: false

- name: Create missing WiFi network profiles
  ansible.builtin.command:
    argv:
      - nmcli
      - connection
      - add
      - type
      - wifi
      - ifname
      - "{{ remote_node_wifi_iface.stdout | trim }}"
      - con-name
      - "{{ item.item.ssid }}"
      - ssid
      - "{{ item.item.ssid }}"
  loop: "{{ remote_node_wifi_profile_checks.results }}"
  loop_control:
    label: "{{ item.item.ssid }}"
  when: item.rc != 0
  changed_when: true

- name: Enforce configured WPA-PSK WiFi profiles as system-wide
  ansible.builtin.command:
    argv:
      - nmcli
      - connection
      - modify
      - "{{ item.ssid }}"
      - connection.permissions
      - ""
      - connection.autoconnect
      - "{{ 'yes' if (item.autoconnect | default(false) | bool) else 'no' }}"
      - connection.autoconnect-priority
      - "{{ item.autoconnect_priority | default(0) | string }}"
      - 802-11-wireless.mode
      - infrastructure
      - 802-11-wireless-security.key-mgmt
      - wpa-psk
      - 802-11-wireless-security.psk
      - "{{ lookup('vars', item.password_var) }}"
      - 802-11-wireless-security.psk-flags
      - "0"
  loop: "{{ remote_node_wifi_networks | rejectattr('open', 'defined') | list + (remote_node_wifi_networks | selectattr('open', 'defined') | rejectattr('open', 'equalto', true) | list) }}"
  loop_control:
    label: "{{ item.ssid }}"
  changed_when: false
  no_log: true

- name: Enforce configured open WiFi profiles as system-wide
  ansible.builtin.command:
    argv:
      - nmcli
      - connection
      - modify
      - "{{ item.ssid }}"
      - connection.permissions
      - ""
      - connection.autoconnect
      - "{{ 'yes' if (item.autoconnect | default(false) | bool) else 'no' }}"
      - connection.autoconnect-priority
      - "{{ item.autoconnect_priority | default(0) | string }}"
      - 802-11-wireless.mode
      - infrastructure
  loop: "{{ remote_node_wifi_networks | selectattr('open', 'defined') | selectattr('open', 'equalto', true) | list }}"
  loop_control:
    label: "{{ item.ssid }}"
  changed_when: false

- name: Find active WiFi connection name
  ansible.builtin.shell: |
    set -o pipefail
    nmcli -t -f NAME,TYPE,ACTIVE connection show | awk -F: '$2=="802-11-wireless" && $3=="yes" {print $1; exit}'
  args:
    executable: /bin/bash
  register: remote_node_active_wifi
  changed_when: false

- name: Assert active WiFi connection exists
  ansible.builtin.assert:
    that:
      - remote_node_active_wifi.stdout | trim | length > 0
    fail_msg: "No active WiFi connection found; refusing to continue WiFi hardening."

- name: Ensure active WiFi connection is system-wide and autoconnect
  ansible.builtin.command: >-
    nmcli connection modify {{ remote_node_active_wifi.stdout | trim }}
    connection.permissions ''
    connection.autoconnect yes
    connection.autoconnect-priority 100
  changed_when: false

- name: Read active WiFi PSK from NetworkManager profile
  ansible.builtin.command: >-
    nmcli --show-secrets -g 802-11-wireless-security.psk connection show {{ remote_node_active_wifi.stdout | trim }}
  register: remote_node_active_wifi_psk
  changed_when: false
  failed_when: false
  no_log: true

- name: Persist active WiFi PSK in system profile when available
  ansible.builtin.command: >-
    nmcli connection modify {{ remote_node_active_wifi.stdout | trim }}
    802-11-wireless-security.psk {{ remote_node_active_wifi_psk.stdout | trim }}
    802-11-wireless-security.psk-flags 0
  when:
    - remote_node_active_wifi_psk.rc == 0
    - remote_node_active_wifi_psk.stdout | trim | length > 0
  changed_when: false
  no_log: true

- name: Gather non-active WiFi profiles
  ansible.builtin.shell: |
    set -o pipefail
    nmcli -t -f NAME,TYPE,ACTIVE connection show | awk -F: '$2=="802-11-wireless" && $3!="yes" {print $1}'
  args:
    executable: /bin/bash
  register: remote_node_inactive_wifi_profiles
  changed_when: false

- name: Disable autoconnect on non-active WiFi profiles
  ansible.builtin.command:
    argv:
      - nmcli
      - connection
      - modify
      - "{{ item }}"
      - connection.autoconnect
      - "no"
  loop: "{{ remote_node_inactive_wifi_profiles.stdout_lines }}"
  loop_control:
    label: "{{ item }}"
  when:
    - remote_node_inactive_wifi_profiles.stdout_lines | length > 0
    - item not in remote_node_wifi_ssids
  changed_when: false

- name: Bring active WiFi profile up to confirm validity
  ansible.builtin.command:
    argv:
      - nmcli
      - connection
      - up
      - "{{ remote_node_active_wifi.stdout | trim }}"
  when:
    - (remote_node_active_wifi.stdout | trim) in remote_node_wifi_ssids
      or (remote_node_active_wifi_psk.stdout | default('') | trim | length > 0)
  changed_when: false

- name: Enable unattended upgrades (APT periodic)
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: '0644'
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::AutocleanInterval "7";

- name: Ensure unattended-upgrades service is enabled
  ansible.builtin.service:
    name: unattended-upgrades
    enabled: true
    state: started

- name: Ensure uptimed service is enabled and running
  ansible.builtin.service:
    name: uptimed
    enabled: true
    state: started

- name: Prevent sleep on lid close (battery)
  ansible.builtin.lineinfile:
    path: /etc/systemd/logind.conf
    regexp: '^HandleLidSwitch='
    line: 'HandleLidSwitch=ignore'
  notify: Restart systemd-logind

- name: Disable KWallet auth PAM hook for unattended remote nodes
  ansible.builtin.lineinfile:
    path: /etc/pam.d/sddm
    regexp: '^-auth\s+optional\s+pam_kwallet5\.so$'
    line: '# -auth   optional        pam_kwallet5.so'
  when: config.remote_nodes.disable_kwallet_integration | default(true) | bool

- name: Disable KWallet session PAM hook for unattended remote nodes
  ansible.builtin.lineinfile:
    path: /etc/pam.d/sddm
    regexp: '^-session\s+optional\s+pam_kwallet5\.so\s+auto_start$|^# \\1$'
    line: '# -session optional       pam_kwallet5.so auto_start'
  when: config.remote_nodes.disable_kwallet_integration | default(true) | bool

- name: Prevent sleep on lid close (external power)
  ansible.builtin.lineinfile:
    path: /etc/systemd/logind.conf
    regexp: '^HandleLidSwitchExternalPower='
    line: 'HandleLidSwitchExternalPower=ignore'
  notify: Restart systemd-logind

- name: Prevent sleep on lid close (docked)
  ansible.builtin.lineinfile:
    path: /etc/systemd/logind.conf
    regexp: '^HandleLidSwitchDocked='
    line: 'HandleLidSwitchDocked=ignore'
  notify: Restart systemd-logind

- name: Hard-disable suspend and hibernate targets for unattended remote nodes
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
    masked: true
  loop:
    - sleep.target
    - suspend.target
    - hibernate.target
    - hybrid-sleep.target
  when: config.remote_nodes.disable_sleep_targets | default(true) | bool

- name: Install remote-node healthcheck script
  ansible.builtin.copy:
    dest: /usr/local/sbin/remote-node-healthcheck
    owner: root
    group: root
    mode: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      log() { logger -t remote-node-healthcheck "$*"; }
      STATE_DIR=/var/lib/remote-node-healthcheck
      STATE_FILE="$STATE_DIR/state"
      mkdir -p "$STATE_DIR"

      FAIL_COUNT=0
      FIRST_FAIL=0
      LAST_NM_RESTART=0
      LAST_REBOOT=0
      if [[ -f "$STATE_FILE" ]]; then
        # shellcheck disable=SC1090
        source "$STATE_FILE" || true
      fi

      now="$(date +%s)"
      nm_restart_after_failures={{ config.remote_nodes.failsafe.nm_restart_after_failures | default(3) }}
      nm_restart_cooldown={{ config.remote_nodes.failsafe.nm_restart_cooldown_seconds | default(900) }}
      reboot_after_failure={{ config.remote_nodes.failsafe.reboot_after_failure_seconds | default(2700) }}
      reboot_cooldown={{ config.remote_nodes.failsafe.reboot_cooldown_seconds | default(86400) }}

      write_state() {
        cat > "$STATE_FILE" <<STATE
      FAIL_COUNT=$FAIL_COUNT
      FIRST_FAIL=$FIRST_FAIL
      LAST_NM_RESTART=$LAST_NM_RESTART
      LAST_REBOOT=$LAST_REBOOT
      STATE
      }

      if command -v nmcli >/dev/null 2>&1; then
        if ! nmcli -t -f STATE general status | grep -q '^connected$'; then
          FAIL_COUNT=$((FAIL_COUNT + 1))
          [[ "$FIRST_FAIL" -eq 0 ]] && FIRST_FAIL=$now
          log "NetworkManager non-connected (fail_count=$FAIL_COUNT)"
        else
          FAIL_COUNT=0
          FIRST_FAIL=0
        fi
      fi

      if systemctl list-unit-files --no-legend --no-pager | grep -q '^tailscaled\.service'; then
        if ! systemctl is-active --quiet tailscaled; then
          log "tailscaled inactive; attempting restart"
          systemctl restart tailscaled || log "tailscaled restart failed"
        fi
      fi

      if [[ "$FAIL_COUNT" -ge "$nm_restart_after_failures" ]]; then
        if (( now - LAST_NM_RESTART >= nm_restart_cooldown )); then
          log "Restarting NetworkManager after sustained failures"
          systemctl restart NetworkManager || log "NetworkManager restart failed"
          LAST_NM_RESTART=$now
        fi
      fi

      if [[ "$FIRST_FAIL" -gt 0 ]] && (( now - FIRST_FAIL >= reboot_after_failure )); then
        if (( now - LAST_REBOOT >= reboot_cooldown )); then
          log "Sustained network failure; performing bounded reboot"
          LAST_REBOOT=$now
          write_state
          systemctl reboot
          exit 0
        fi
      fi

      write_state

- name: Install remote-node healthcheck service unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/remote-node-healthcheck.service
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Description=Remote node health check
      Wants=network-online.target
      After=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/remote-node-healthcheck

- name: Install remote-node healthcheck timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/remote-node-healthcheck.timer
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Description=Run remote node health check every 5 minutes

      [Timer]
      OnBootSec=2min
      OnUnitActiveSec={{ config.remote_nodes.failsafe.check_interval_minutes | default(5) }}min
      Persistent=true

      [Install]
      WantedBy=timers.target
  notify: Reload systemd

- name: Enable and start remote-node healthcheck timer
  ansible.builtin.systemd:
    name: remote-node-healthcheck.timer
    enabled: true
    state: started
    daemon_reload: true

# ── Battery management (ThinkPad only) ─────────────────────────────

- name: Check for ThinkPad battery threshold sysfs
  ansible.builtin.stat:
    path: /sys/class/power_supply/BAT1/charge_control_end_threshold
  register: thinkpad_battery_sysfs

- name: Install TLP for ThinkPad battery management
  ansible.builtin.apt:
    name:
      - tlp
      - tlp-rdw
    state: present
  when:
    - remote_node_cfg.battery.enabled | default(false) | bool
    - thinkpad_battery_sysfs.stat.exists | default(false)

- name: Deploy TLP battery threshold config
  ansible.builtin.copy:
    dest: /etc/tlp.d/01-battery-thresholds.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      START_CHARGE_THRESH_BAT1={{ remote_node_cfg.battery.start_threshold | default(40) }}
      STOP_CHARGE_THRESH_BAT1={{ remote_node_cfg.battery.stop_threshold | default(80) }}
  when:
    - remote_node_cfg.battery.enabled | default(false) | bool
    - thinkpad_battery_sysfs.stat.exists | default(false)
  notify: Restart TLP

- name: Enable TLP service
  ansible.builtin.service:
    name: tlp
    enabled: true
    state: started
  when:
    - remote_node_cfg.battery.enabled | default(false) | bool
    - thinkpad_battery_sysfs.stat.exists | default(false)

- name: Note — battery threshold not available on Apple hardware
  ansible.builtin.debug:
    msg: >-
      Battery threshold management is not available on this hardware
      (Apple SMC does not expose charge_control sysfs). Skipping.
  when:
    - not (remote_node_cfg.battery.enabled | default(false) | bool)
      or not (thinkpad_battery_sysfs.stat.exists | default(false))

# ── Powertop auto-tune ─────────────────────────────────────────────

- name: Install powertop
  ansible.builtin.apt:
    name: powertop
    state: present
  when: remote_node_cfg.powertop.enabled | default(false) | bool

- name: Deploy powertop autotune service
  ansible.builtin.copy:
    dest: /etc/systemd/system/powertop-autotune.service
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Description=Powertop autotune
      After=network.target

      [Service]
      Type=oneshot
      ExecStart=/usr/sbin/powertop --auto-tune
      {% if (remote_node_cfg.powertop.exclude_interfaces | default([])) | length > 0 %}
      ExecStartPost=/bin/bash -c 'for iface in {{ remote_node_cfg.powertop.exclude_interfaces | join(" ") }}; do /sbin/iw dev $$iface set power_save off 2>/dev/null || true; done'
      {% endif %}
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
  when: remote_node_cfg.powertop.enabled | default(false) | bool
  notify: Reload systemd

- name: Enable and start powertop autotune
  ansible.builtin.systemd:
    name: powertop-autotune
    enabled: true
    state: started
    daemon_reload: true
  when: remote_node_cfg.powertop.enabled | default(false) | bool

# ── NTP (chrony) ───────────────────────────────────────────────────

- name: Install chrony
  ansible.builtin.apt:
    name: chrony
    state: present

- name: Enable and start chronyd
  ansible.builtin.service:
    name: chronyd
    enabled: true
    state: started

# ── Log rotation ───────────────────────────────────────────────────

- name: Deploy remote-node log rotation config
  ansible.builtin.copy:
    dest: /etc/logrotate.d/remote-node
    owner: root
    group: root
    mode: '0644'
    content: |
      /var/log/syslog
      /var/log/auth.log
      /var/log/kern.log
      {
          rotate 4
          weekly
          missingok
          notifempty
          compress
          delaycompress
          sharedscripts
          postrotate
              /usr/lib/rsyslog/rsyslog-rotate
          endscript
      }
