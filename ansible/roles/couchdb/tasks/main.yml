- name: Set CouchDB paths
  ansible.builtin.set_fact:
    couchdb_compose_dir: "/docker/docker-compose-{{ inventory_hostname }}"

- name: Create CouchDB application directory
  ansible.builtin.file:
    path: "{{ couchdb_compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create CouchDB data directory
  ansible.builtin.file:
    path: "{{ couchdb_compose_dir }}/data"
    state: directory
    owner: "5984"
    group: "5984"
    mode: '0755'

- name: Ensure CouchDB data directory ownership is correct
  ansible.builtin.file:
    path: "{{ couchdb_compose_dir }}/data"
    state: directory
    owner: "5984"
    group: "5984"
    recurse: true

- name: Copy CouchDB Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yaml.j2
    dest: "{{ couchdb_compose_dir }}/docker-compose.yaml"
    owner: root
    group: root
    mode: '0644'

- name: Deploy CouchDB via Docker Compose
  ansible.builtin.command:
    cmd: docker compose up -d
  args:
    chdir: "{{ couchdb_compose_dir }}"
  changed_when: false

- name: Configure CouchDB CORS settings for LiveSync
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ config.couchdb.port }}/_node/_local/_config/{{ item.section }}/{{ item.key }}"
    method: PUT
    user: "{{ config.couchdb.admin_user }}"
    password: "{{ couchdb_admin_password }}"
    force_basic_auth: true
    headers:
      Content-Type: application/json
    body_format: raw
    body: "{{ item.value | to_json }}"
    status_code: 200
  loop:
    - section: chttpd
      key: enable_cors
      value: "{{ (config.couchdb.cors.enabled | default(true)) | ternary('true', 'false') }}"
    - section: cors
      key: origins
      value: "{{ config.couchdb.cors.origins | default('*') }}"
    - section: cors
      key: methods
      value: "{{ config.couchdb.cors.methods | default('GET, PUT, POST, HEAD, DELETE, OPTIONS') }}"
    - section: cors
      key: headers
      value: "{{ config.couchdb.cors.headers | default('Authorization, Content-Type, Origin, Accept, Referer') }}"
    - section: cors
      key: credentials
      value: "{{ (config.couchdb.cors.credentials | default(true)) | ternary('true', 'false') }}"
  no_log: true
