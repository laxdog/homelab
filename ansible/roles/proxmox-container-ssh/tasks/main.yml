---
- name: Read SSH public key from control machine
  ansible.builtin.set_fact:
    ssh_public_key: "{{ lookup('file', config.proxmox.ssh_public_key_path) | trim }}"

- name: Check for SSH server inside LXCs
  ansible.builtin.command: pct exec {{ item.value.id }} -- test -x /usr/sbin/sshd
  loop: "{{ config.services.lxcs | dict2items }}"
  register: lxc_sshd_check
  failed_when: false
  changed_when: false

- name: Install SSH server where missing
  ansible.builtin.command: >
    pct exec {{ item.item.value.id }} -- bash -lc
    "apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y openssh-server"
  loop: "{{ lxc_sshd_check.results }}"
  when: item.rc != 0

- name: Check for authorized_keys in LXCs
  ansible.builtin.command: >
    pct exec {{ item.value.id }} -- bash -lc
    "test -f /root/.ssh/authorized_keys && grep -qxF '{{ ssh_public_key }}' /root/.ssh/authorized_keys"
  loop: "{{ config.services.lxcs | dict2items }}"
  register: lxc_key_check
  failed_when: false
  changed_when: false

- name: Ensure SSH key present in LXCs
  ansible.builtin.command: >
    pct exec {{ item.item.value.id }} -- bash -lc
    "mkdir -p /root/.ssh && chmod 700 /root/.ssh &&
     touch /root/.ssh/authorized_keys && chmod 600 /root/.ssh/authorized_keys &&
     grep -qxF '{{ ssh_public_key }}' /root/.ssh/authorized_keys || echo '{{ ssh_public_key }}' >> /root/.ssh/authorized_keys"
  loop: "{{ lxc_key_check.results }}"
  when: item.rc != 0

- name: Check SSH service status in LXCs
  ansible.builtin.command: >
    pct exec {{ item.value.id }} -- bash -lc
    "if systemctl list-unit-files | grep -q '^ssh.service'; then svc=ssh; else svc=sshd; fi;
     systemctl is-enabled ${svc} >/dev/null 2>&1 && systemctl is-active ${svc} >/dev/null 2>&1"
  loop: "{{ config.services.lxcs | dict2items }}"
  register: lxc_ssh_service_check
  failed_when: false
  changed_when: false

- name: Ensure SSH service enabled and running in LXCs
  ansible.builtin.command: >
    pct exec {{ item.item.value.id }} -- bash -lc
    "systemctl enable --now ssh || systemctl enable --now sshd"
  loop: "{{ lxc_ssh_service_check.results }}"
  when: item.rc != 0
