---
- name: Read SSH public key from control machine
  ansible.builtin.set_fact:
    ssh_public_key: "{{ lookup('file', config.proxmox.ssh_public_key_path) | trim }}"

- name: Ensure host key file exists
  ansible.builtin.copy:
    dest: /root/.ssh/terraform.pub
    content: "{{ ssh_public_key }}\n"
    owner: root
    group: root
    mode: '0644'

- name: Read current LXC configs
  ansible.builtin.command: pct config {{ item.value.id }}
  loop: "{{ config.services.lxcs | dict2items }}"
  register: lxc_configs
  changed_when: false

- name: Ensure SSH key applied to LXCs
  ansible.builtin.command: pct set {{ item.item.value.id }} -ssh-public-keys /root/.ssh/terraform.pub
  loop: "{{ lxc_configs.results }}"
  when: ssh_public_key not in item.stdout
