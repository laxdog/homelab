---
- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Ensure keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker GPG key
  ansible.builtin.command:
    cmd: curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
    creates: /etc/apt/keyrings/docker.asc

- name: Ensure Docker GPG key permissions
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Find legacy Docker apt source files
  ansible.builtin.shell: |
    set -o pipefail
    grep -RIl "download.docker.com/linux/ubuntu" /etc/apt/sources.list /etc/apt/sources.list.d 2>/dev/null \
      | grep -vE '^/etc/apt/sources.list.d/docker.list$' || true
  args:
    executable: /bin/bash
  register: docker_legacy_source_files
  changed_when: false

- name: Remove legacy Docker apt source files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ docker_legacy_source_files.stdout_lines }}"
  when: docker_legacy_source_files.stdout_lines | length > 0

- name: Remove legacy Docker docker.gpg source entries
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/docker.list
    regexp: '^deb .*download\.docker\.com/linux/ubuntu .*docker\.gpg.*$'
    state: absent

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts['lsb']['codename'] }} stable"
    state: present
    filename: docker

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
