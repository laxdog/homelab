---
- name: Read Cloudflare zones
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones?name={{ config.cloudflare.zone }}"
    method: GET
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: application/json
  register: cloudflare_zones

- name: Assert Cloudflare zone found
  ansible.builtin.assert:
    that:
      - cloudflare_zones.json.result | length > 0
    fail_msg: "Cloudflare zone not found for {{ config.cloudflare.zone }}"

- name: Select Cloudflare zone ID
  ansible.builtin.set_fact:
    cloudflare_zone_id: "{{ cloudflare_zones.json.result[0].id }}"

- name: Look up Cloudflare records to remove
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records?name={{ item }}"
    method: GET
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: application/json
  register: cloudflare_remove_lookup
  loop: "{{ config.cloudflare.remove_records | default([]) }}"

- name: Remove Cloudflare DNS records when present
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records/{{ item.id }}"
    method: DELETE
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
      Content-Type: application/json
    status_code: [200, 204]
  loop: "{{ cloudflare_remove_lookup.results | map(attribute='json') | map(attribute='result') | list | flatten(levels=1) }}"
  when: config.cloudflare.remove_records | default([]) | length > 0

- name: Ensure Cloudflare DNS records exist
  ansible.builtin.include_tasks: record.yml
  loop: "{{ config.cloudflare.records }}"
  loop_control:
    loop_var: record
