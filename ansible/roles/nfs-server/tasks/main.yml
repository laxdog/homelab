---
- name: Install NFS server package
  ansible.builtin.apt:
    name: nfs-kernel-server
    state: present
    update_cache: true

- name: Assert media data path is populated before export
  ansible.builtin.stat:
    path: "{{ config.media_stack.nfs.export_path }}"
  register: nfs_export_path

- name: Fail when media data path is missing
  ansible.builtin.assert:
    that:
      - nfs_export_path.stat.exists
      - nfs_export_path.stat.isdir
    fail_msg: >-
      NFS export path {{ config.media_stack.nfs.export_path }} does not exist.
      Verify virtiofs mounts are configured for VM120.

- name: Ensure exports directory exists
  ansible.builtin.file:
    path: /etc/exports.d
    state: directory
    mode: "0755"

- name: Configure media-stack NFS export
  ansible.builtin.copy:
    dest: /etc/exports.d/media-stack.exports
    mode: "0644"
    content: |
      {{ config.media_stack.nfs.export_path }} {{ config.media_stack.nfs.allowed_cidr }}({{ config.media_stack.nfs.options }})
  register: media_stack_exports

- name: Reload NFS exports when changed
  ansible.builtin.command: exportfs -ra
  when: media_stack_exports.changed
  changed_when: true

- name: Ensure NFS service is enabled and running
  ansible.builtin.shell: |
    if systemctl list-unit-files --no-legend --no-pager | grep -q '^nfs-server.service'; then
      systemctl enable --now nfs-server
    else
      systemctl enable --now nfs-kernel-server
    fi
  args:
    executable: /bin/bash
  changed_when: false
