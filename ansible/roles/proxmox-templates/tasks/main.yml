---
- name: Update LXC template index
  ansible.builtin.command: pveam update
  changed_when: false

- name: List LXC templates in storage
  ansible.builtin.command: pveam list {{ config.proxmox.storages.templates_dir }}
  register: lxc_templates
  changed_when: false

- name: Download LXC template if missing
  ansible.builtin.command: >
    pveam download {{ config.proxmox.storages.templates_dir }} {{ config.proxmox.templates.lxc.file_name }}
  when: config.proxmox.templates.lxc.file_name not in lxc_templates.stdout

- name: Resolve VM cloud image path
  ansible.builtin.command: >
    pvesm path {{ config.proxmox.storages.templates_dir }}:import/{{ config.proxmox.templates.vm.file_name }}
  register: cloud_image_path
  changed_when: false

- name: Check VM cloud image presence
  ansible.builtin.stat:
    path: "{{ cloud_image_path.stdout }}"
  register: cloud_image_stat

- name: Download VM cloud image if missing
  ansible.builtin.get_url:
    url: "{{ config.proxmox.templates.vm.url }}"
    dest: "{{ cloud_image_path.stdout }}"
    mode: '0644'
  when: not cloud_image_stat.stat.exists
