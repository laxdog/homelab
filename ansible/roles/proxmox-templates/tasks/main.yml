---
- name: Update LXC template index
  ansible.builtin.command: pveam update
  changed_when: false

- name: List LXC templates in storage
  ansible.builtin.command: pveam list {{ config.proxmox.storages.templates_dir }}
  register: lxc_templates
  changed_when: false

- name: Download LXC template if missing
  ansible.builtin.command: >
    pveam download {{ config.proxmox.storages.templates_dir }} {{ config.proxmox.templates.lxc.file_name }}
  when: config.proxmox.templates.lxc.file_name not in lxc_templates.stdout

- name: Resolve VM cloud image path
  ansible.builtin.command: >
    pvesm path {{ config.proxmox.storages.templates_dir }}:import/{{ config.proxmox.templates.vm.file_name }}
  register: cloud_image_path
  changed_when: false

- name: Check VM cloud image presence
  ansible.builtin.stat:
    path: "{{ cloud_image_path.stdout }}"
  register: cloud_image_stat

- name: Download VM cloud image if missing
  ansible.builtin.command: >
    curl -L -o {{ cloud_image_path.stdout }} {{ config.proxmox.templates.vm.url }}
  args:
    creates: "{{ cloud_image_path.stdout }}"
  when: not cloud_image_stat.stat.exists

- name: Resolve HAOS image paths
  ansible.builtin.command: >
    pvesm path {{ config.proxmox.storages.templates_dir }}:import/{{ config.proxmox.templates.haos.file_name }}
  register: haos_image_path
  changed_when: false

- name: Derive HAOS archive path
  ansible.builtin.set_fact:
    haos_archive_path: "{{ cloud_image_path.stdout | dirname }}/{{ config.proxmox.templates.haos.archive_name }}"

- name: Check HAOS image presence
  ansible.builtin.stat:
    path: "{{ haos_image_path.stdout }}"
  register: haos_image_stat

- name: Download HAOS archive if missing
  ansible.builtin.command: >
    curl -L -o {{ haos_archive_path }} {{ config.proxmox.templates.haos.url }}
  args:
    creates: "{{ haos_archive_path }}"
  when: not haos_image_stat.stat.exists

- name: Extract HAOS image from archive
  ansible.builtin.command: >
    xz -d -k {{ haos_archive_path }}
  args:
    creates: "{{ haos_image_path.stdout }}"
  when: not haos_image_stat.stat.exists
