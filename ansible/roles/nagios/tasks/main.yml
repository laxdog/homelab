---
- name: Install Nagios packages
  ansible.builtin.apt:
    name:
      - apache2-utils
      - nagios4
      - nagios-plugins
    state: present
    update_cache: true

- name: Ensure Nagios resource.cfg permissions
  ansible.builtin.file:
    path: /etc/nagios4/resource.cfg
    owner: root
    group: nagios
    mode: '0640'

- name: Ensure Nagios checkresults directory exists
  ansible.builtin.file:
    path: /var/lib/nagios4/spool/checkresults
    state: directory
    owner: nagios
    group: nagios
    mode: '0755'

- name: Check Nagios htpasswd file
  ansible.builtin.stat:
    path: /etc/nagios4/htpasswd.users
  register: nagios_htpasswd

- name: Verify Nagios web credentials
  ansible.builtin.command: >
    htpasswd -vb /etc/nagios4/htpasswd.users {{ config.nagios.admin_user }} {{ nagios_admin_password }}
  register: nagios_htpasswd_check
  changed_when: false
  failed_when: false
  no_log: true
  when: nagios_htpasswd.stat.exists

- name: Create Nagios web credentials when missing
  ansible.builtin.command: >
    htpasswd -b -c /etc/nagios4/htpasswd.users {{ config.nagios.admin_user }} {{ nagios_admin_password }}
  args:
    creates: /etc/nagios4/htpasswd.users
  no_log: true

- name: Update Nagios web credentials when needed
  ansible.builtin.command: >
    htpasswd -b /etc/nagios4/htpasswd.users {{ config.nagios.admin_user }} {{ nagios_admin_password }}
  when:
    - nagios_htpasswd.stat.exists
    - nagios_htpasswd_check.rc != 0
  no_log: true

- name: Install homelab Nagios configuration
  ansible.builtin.template:
    src: homelab.cfg.j2
    dest: /etc/nagios4/conf.d/homelab.cfg
    owner: root
    group: root
    mode: '0644'
  notify: Restart Nagios

- name: Enable Apache CGI module
  ansible.builtin.command: a2enmod cgi
  register: nagios_a2enmod_cgi
  changed_when: "'Enabling module' in nagios_a2enmod_cgi.stdout"

- name: Enable Apache rewrite module
  ansible.builtin.command: a2enmod rewrite
  register: nagios_a2enmod_rewrite
  changed_when: "'Enabling module' in nagios_a2enmod_rewrite.stdout"

- name: Enable Nagios Apache config
  ansible.builtin.command: a2enconf nagios4-cgi
  register: nagios_a2enconf
  changed_when: "'Enabling conf' in nagios_a2enconf.stdout"

- name: Install Nagios redirect config
  ansible.builtin.copy:
    dest: /etc/apache2/conf-available/nagios-redirect.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      RewriteEngine On
      RewriteCond %{REQUEST_URI} =/
      RewriteCond %{HTTP:X-Forwarded-Proto} =https
      RewriteRule ^/$ https://%{HTTP_HOST}/nagios4/ [R=302,L]

      RewriteCond %{REQUEST_URI} =/
      RewriteCond %{HTTP:X-Forwarded-Proto} !https
      RewriteRule ^/$ /nagios4/ [R=302,L]
  notify: Reload Apache

- name: Enable Nagios redirect config
  ansible.builtin.command: a2enconf nagios-redirect
  register: nagios_redirect_conf
  changed_when: "'Enabling conf' in nagios_redirect_conf.stdout"
  notify: Reload Apache

- name: Ensure Nagios service is running
  ansible.builtin.service:
    name: nagios4
    state: started
    enabled: true

- name: Ensure Apache service is running
  ansible.builtin.service:
    name: apache2
    state: started
    enabled: true
