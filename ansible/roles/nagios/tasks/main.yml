---
- name: Install Nagios build/runtime packages
  ansible.builtin.apt:
    name:
      - apache2
      - apache2-utils
      - build-essential
      - curl
      - libapache2-mod-php
      - libgd-dev
      - libssl-dev
      - php
      - php-gd
      - nagios-plugins
      - unzip
      - wget
    state: present
    update_cache: true

- name: Remove distro Nagios Core packages
  ansible.builtin.apt:
    name:
      - nagios4
      - nagios4-common
      - nagios4-core
      - nagios4-cgi
    state: absent
  failed_when: false

- name: Ensure Nagios user exists
  ansible.builtin.user:
    name: nagios
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Ensure nagcmd group exists
  ansible.builtin.group:
    name: nagcmd
    system: true

- name: Add nagios to nagcmd group
  ansible.builtin.user:
    name: nagios
    groups: nagcmd
    append: true

- name: Add www-data to nagcmd group
  ansible.builtin.user:
    name: www-data
    groups: nagcmd
    append: true

- name: Add www-data to nagios group
  ansible.builtin.user:
    name: www-data
    groups: nagios
    append: true
  notify: Reload Apache

- name: Check installed Nagios Core version
  ansible.builtin.command: /usr/local/nagios/bin/nagios -V
  register: nagios_version_check
  changed_when: false
  failed_when: false

- name: Determine desired Nagios Core version
  ansible.builtin.set_fact:
    nagios_core_version: "{{ config.nagios.core_version | default('4.5.11') }}"
    nagios_installed_version: >-
      {{ (nagios_version_check.stdout | default('') | regex_findall('Nagios Core ([0-9.]+)') | first) | default('') }}

- name: Determine if Nagios Core upgrade is needed
  ansible.builtin.set_fact:
    nagios_core_upgrade_needed: >-
      {{ (nagios_version_check.rc | default(1)) != 0
         or (nagios_version_check.stdout | default('')) == ''
         or (nagios_installed_version != (config.nagios.core_version | default('4.5.11'))) }}

- name: Ensure source directory exists
  ansible.builtin.file:
    path: /usr/local/src
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Download Nagios Core source
  ansible.builtin.command: >
    curl -L -o /usr/local/src/nagios-{{ nagios_core_version }}.tar.gz
    https://assets.nagios.com/downloads/nagioscore/releases/nagios-{{ nagios_core_version }}.tar.gz
  args:
    creates: "/usr/local/src/nagios-{{ nagios_core_version }}.tar.gz"
  when: nagios_core_upgrade_needed

- name: Extract Nagios Core source
  ansible.builtin.unarchive:
    src: "/usr/local/src/nagios-{{ nagios_core_version }}.tar.gz"
    dest: /usr/local/src
    remote_src: true
  when: nagios_core_upgrade_needed

- name: Configure Nagios Core
  ansible.builtin.command: ./configure --with-command-group=nagcmd
  args:
    chdir: "/usr/local/src/nagios-{{ nagios_core_version }}"
  when: nagios_core_upgrade_needed

- name: Build Nagios Core
  ansible.builtin.command: make all
  args:
    chdir: "/usr/local/src/nagios-{{ nagios_core_version }}"
  when: nagios_core_upgrade_needed

- name: Install Nagios Core
  ansible.builtin.command: make install
  args:
    chdir: "/usr/local/src/nagios-{{ nagios_core_version }}"
  when: nagios_core_upgrade_needed

- name: Install Nagios Core init scripts
  ansible.builtin.command: make install-init
  args:
    chdir: "/usr/local/src/nagios-{{ nagios_core_version }}"
  when: nagios_core_upgrade_needed

- name: Reload systemd units
  ansible.builtin.command: systemctl daemon-reload
  when: nagios_core_upgrade_needed

- name: Install Nagios Core sample config
  ansible.builtin.command: make install-config
  args:
    chdir: "/usr/local/src/nagios-{{ nagios_core_version }}"
  when: nagios_core_upgrade_needed

- name: Install Nagios Core command mode
  ansible.builtin.command: make install-commandmode
  args:
    chdir: "/usr/local/src/nagios-{{ nagios_core_version }}"
  when: nagios_core_upgrade_needed

- name: Ensure Nagios binaries are executable
  ansible.builtin.file:
    path: /usr/local/nagios/bin/nagios
    mode: '0755'

- name: Ensure Nagios CGI binaries are executable
  ansible.builtin.file:
    path: /usr/local/nagios/sbin
    mode: '0755'
    recurse: true

- name: Stat Nagios libexec path
  ansible.builtin.stat:
    path: /usr/local/nagios/libexec
  register: nagios_libexec

- name: Remove Nagios libexec directory when present
  ansible.builtin.file:
    path: /usr/local/nagios/libexec
    state: absent
  when:
    - nagios_libexec.stat.exists
    - nagios_libexec.stat.islnk is not defined or not nagios_libexec.stat.islnk

- name: Ensure Nagios plugins symlink
  ansible.builtin.file:
    src: /usr/lib/nagios/plugins
    dest: /usr/local/nagios/libexec
    state: link

- name: Install raffle-raptor Nagios plugin
  ansible.builtin.template:
    src: check_raffle_raptor.py.j2
    dest: /usr/local/nagios/libexec/check_raffle_raptor.py
    owner: root
    group: root
    mode: '0755'
  notify: Restart Nagios

- name: Ensure Nagios resource.cfg permissions
  ansible.builtin.file:
    path: /usr/local/nagios/etc/resource.cfg
    owner: root
    group: nagios
    mode: '0640'

- name: Ensure Nagios checkresults directory exists
  ansible.builtin.file:
    path: /usr/local/nagios/var/spool/checkresults
    state: directory
    owner: nagios
    group: nagios
    mode: '0755'

- name: Check Nagios htpasswd file
  ansible.builtin.stat:
    path: /usr/local/nagios/etc/htpasswd.users
  register: nagios_htpasswd

- name: Verify Nagios web credentials
  ansible.builtin.command: >
    htpasswd -vb /usr/local/nagios/etc/htpasswd.users {{ config.nagios.admin_user }} {{ nagios_admin_password }}
  register: nagios_htpasswd_check
  changed_when: false
  failed_when: false
  no_log: true
  when: nagios_htpasswd.stat.exists

- name: Create Nagios web credentials when missing
  ansible.builtin.command: >
    htpasswd -b -c /usr/local/nagios/etc/htpasswd.users {{ config.nagios.admin_user }} {{ nagios_admin_password }}
  args:
    creates: /usr/local/nagios/etc/htpasswd.users
  no_log: true

- name: Update Nagios web credentials when needed
  ansible.builtin.command: >
    htpasswd -b /usr/local/nagios/etc/htpasswd.users {{ config.nagios.admin_user }} {{ nagios_admin_password }}
  when:
    - nagios_htpasswd.stat.exists
    - nagios_htpasswd_check.rc != 0
  no_log: true

- name: Ensure Nagios custom config directory exists
  ansible.builtin.file:
    path: /usr/local/nagios/etc/objects
    state: directory
    owner: nagios
    group: nagios
    mode: '0755'

- name: Install homelab Nagios configuration
  ansible.builtin.template:
    src: homelab.cfg.j2
    dest: /usr/local/nagios/etc/objects/homelab.cfg
    owner: nagios
    group: nagios
    mode: '0644'
  notify: Restart Nagios

- name: Ensure homelab config referenced in nagios.cfg
  ansible.builtin.lineinfile:
    path: /usr/local/nagios/etc/nagios.cfg
    regexp: '^cfg_file=/usr/local/nagios/etc/objects/homelab.cfg$'
    line: 'cfg_file=/usr/local/nagios/etc/objects/homelab.cfg'
    insertafter: EOF
  notify: Restart Nagios

- name: Disable default localhost objects
  ansible.builtin.lineinfile:
    path: /usr/local/nagios/etc/nagios.cfg
    regexp: '^cfg_file=/usr/local/nagios/etc/objects/localhost.cfg$'
    state: absent
  notify: Restart Nagios

- name: Set Nagios CGI HTML base path
  ansible.builtin.lineinfile:
    path: /usr/local/nagios/etc/cgi.cfg
    regexp: '^url_html_path='
    line: 'url_html_path=/nagios'
  notify: Restart Nagios

- name: Set Nagios CGI base URL
  ansible.builtin.lineinfile:
    path: /usr/local/nagios/share/config.inc.php
    regexp: "^\\$cfg\\['cgi_base_url'\\]="
    line: "$cfg['cgi_base_url']='/nagios/cgi-bin';"
  notify: Restart Nagios

- name: Grant Nagios admin user full CGI permissions
  ansible.builtin.blockinfile:
    path: /usr/local/nagios/etc/cgi.cfg
    marker: "# {mark} ANSIBLE MANAGED ADMIN AUTH"
    block: |
      authorized_for_system_information={{ config.nagios.admin_user }}
      authorized_for_configuration_information={{ config.nagios.admin_user }}
      authorized_for_system_commands={{ config.nagios.admin_user }}
      authorized_for_all_services={{ config.nagios.admin_user }}
      authorized_for_all_hosts={{ config.nagios.admin_user }}
      authorized_for_all_service_commands={{ config.nagios.admin_user }}
      authorized_for_all_host_commands={{ config.nagios.admin_user }}
      authorized_for_all_service_comments={{ config.nagios.admin_user }}
      authorized_for_all_host_comments={{ config.nagios.admin_user }}
      authorized_for_all_service_downtime={{ config.nagios.admin_user }}
      authorized_for_all_host_downtime={{ config.nagios.admin_user }}
  notify: Restart Nagios

- name: Install Nagios Discord webhook file
  ansible.builtin.copy:
    dest: /usr/local/nagios/etc/discord-webhook
    content: "{{ discord_webhook }}"
    owner: nagios
    group: nagios
    mode: '0600'
  no_log: true
  notify: Restart Nagios

- name: Install Nagios Discord notification script
  ansible.builtin.copy:
    dest: /usr/local/bin/nagios-discord.sh
    owner: root
    group: root
    mode: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      webhook_file="/usr/local/nagios/etc/discord-webhook"
      if [[ ! -f "${webhook_file}" ]]; then
        exit 2
      fi

      webhook="$(cat "${webhook_file}")"
      if [[ -z "${webhook}" ]]; then
        exit 3
      fi

      kind="$1"
      host="$2"
      service="${3:-}"
      state="${4:-}"
      output="${5:-}"
      when="$(date -u +"%Y-%m-%d %H:%M:%SZ")"

      if [[ "${kind}" == "service" ]]; then
        title="Service ${state}"
        desc="**Host:** ${host}\\n**Service:** ${service}\\n**Output:** ${output}\\n**Time:** ${when}"
      else
        title="Host ${state}"
        desc="**Host:** ${host}\\n**Output:** ${output}\\n**Time:** ${when}"
      fi

      payload=$(cat <<EOF
      {
        "username": "Nagios",
        "embeds": [
          {
            "title": "${title}",
            "description": "${desc}",
            "color": 15105570
          }
        ]
      }
      EOF
      )

      curl -sS -X POST -H "Content-Type: application/json" -d "${payload}" "${webhook}" >/dev/null
  notify: Restart Nagios

- name: Install Nagios contacts configuration
  ansible.builtin.template:
    src: contacts.cfg.j2
    dest: /usr/local/nagios/etc/objects/contacts.cfg
    owner: nagios
    group: nagios
    mode: '0644'
  notify: Restart Nagios

- name: Enable Apache CGI module
  ansible.builtin.command: a2enmod cgi
  register: nagios_a2enmod_cgi
  changed_when: "'Enabling module' in nagios_a2enmod_cgi.stdout"

- name: Enable Apache rewrite module
  ansible.builtin.command: a2enmod rewrite
  register: nagios_a2enmod_rewrite
  changed_when: "'Enabling module' in nagios_a2enmod_rewrite.stdout"

- name: Install Nagios Apache config
  ansible.builtin.template:
    src: nagios-apache.conf.j2
    dest: /etc/apache2/conf-available/nagios.conf
    owner: root
    group: root
    mode: '0644'
  notify: Reload Apache

- name: Enable Nagios Apache config
  ansible.builtin.command: a2enconf nagios
  register: nagios_a2enconf
  changed_when: "'Enabling conf' in nagios_a2enconf.stdout"
  notify: Reload Apache

- name: Install Nagios redirect config
  ansible.builtin.copy:
    dest: /etc/apache2/conf-available/nagios-redirect.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      RewriteEngine On
      RewriteCond %{REQUEST_URI} =/
      RewriteCond %{HTTP:X-Forwarded-Proto} =https
      RewriteRule ^/$ https://%{HTTP_HOST}/nagios4/ [R=302,L]

      RewriteCond %{REQUEST_URI} =/
      RewriteCond %{HTTP:X-Forwarded-Proto} !https
      RewriteRule ^/$ /nagios4/ [R=302,L]
  notify: Reload Apache

- name: Ensure Nagios redirect in default Apache site
  ansible.builtin.blockinfile:
    path: /etc/apache2/sites-available/000-default.conf
    marker: "# {mark} ANSIBLE MANAGED NAGIOS REDIRECT"
    insertafter: "^\\s*DocumentRoot\\s+"
    block: |
      RewriteEngine On
      RewriteCond %{REQUEST_URI} =/
      RewriteCond %{HTTP:X-Forwarded-Proto} =https
      RewriteRule ^/$ https://%{HTTP_HOST}/nagios4/ [R=302,L]

      RewriteCond %{REQUEST_URI} =/
      RewriteRule ^/$ /nagios4/ [R=302,L]
  notify: Reload Apache

- name: Enable Nagios redirect config
  ansible.builtin.command: a2enconf nagios-redirect
  register: nagios_redirect_conf
  changed_when: "'Enabling conf' in nagios_redirect_conf.stdout"
  notify: Reload Apache

- name: Ensure Nagios service is running
  ansible.builtin.service:
    name: nagios
    state: started
    enabled: true

- name: Ensure Apache service is running
  ansible.builtin.service:
    name: apache2
    state: started
    enabled: true
