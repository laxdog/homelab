---
- name: Resolve RR DB access config
  ansible.builtin.set_fact:
    rr_db_access_cfg: >-
      {{
        (
          (config.services | default({})).get('vms', {}).get(inventory_hostname, {}).get('rr_db_access', {})
        )
        | combine(
            (config.services | default({})).get('lxcs', {}).get(inventory_hostname, {}).get('rr_db_access', {}),
            recursive=True
          )
        | combine(
            (config.remote_nodes | default({})).get('nodes', {}).get(inventory_hostname, {}).get('rr_db_access', {}),
            recursive=True
          )
      }}

- name: Skip host when RR DB access is not enabled
  ansible.builtin.meta: end_host
  when: not (rr_db_access_cfg.enabled | default(false) | bool)

- name: Assert required RR DB access settings are present
  ansible.builtin.assert:
    that:
      - rr_db_access_cfg.db_container | default('') | length > 0
      - rr_db_access_cfg.database | default('') | length > 0
      - rr_db_access_cfg.username | default('') | length > 0
      - rr_db_access_cfg.password_var | default('') | length > 0
      - rr_db_access_cfg.allowed_tailscale_source | default('') | length > 0
    fail_msg: "Missing required rr_db_access config for {{ inventory_hostname }}"

- name: Assert grants are valid SQL privilege keywords
  ansible.builtin.assert:
    that:
      - (rr_db_access_cfg.grants | default(['SELECT']))
          | difference(['SELECT','INSERT','UPDATE','DELETE','REFERENCES','TRIGGER','TRUNCATE'])
          | length == 0
    fail_msg: >-
      rr_db_access.grants must be a subset of
      [SELECT, INSERT, UPDATE, DELETE, REFERENCES, TRIGGER, TRUNCATE].
      Got: {{ rr_db_access_cfg.grants | default(['SELECT']) }}

- name: Assert vaulted DB password is available
  ansible.builtin.assert:
    that:
      - lookup('vars', rr_db_access_cfg.password_var, default='') | length > 0
    fail_msg: "Missing vaulted password variable '{{ rr_db_access_cfg.password_var }}'"

- name: Install RR DB access prerequisites
  ansible.builtin.apt:
    name:
      - socat
      - jq
      - iptables
    state: present
    update_cache: true

- name: Install RR DB Tailscale proxy script
  ansible.builtin.template:
    src: rr-db-ts-proxy.sh.j2
    dest: /usr/local/sbin/rr-db-ts-proxy
    owner: root
    group: root
    mode: '0755'

- name: Install RR DB Tailscale proxy service
  ansible.builtin.template:
    src: rr-db-ts-proxy.service.j2
    dest: /etc/systemd/system/rr-db-ts-proxy.service
    owner: root
    group: root
    mode: '0644'

- name: Install RR DB ingress firewall script
  ansible.builtin.template:
    src: rr-db-ts-firewall.sh.j2
    dest: /usr/local/sbin/rr-db-ts-firewall
    owner: root
    group: root
    mode: '0755'

- name: Install RR DB ingress firewall service
  ansible.builtin.template:
    src: rr-db-ts-firewall.service.j2
    dest: /etc/systemd/system/rr-db-ts-firewall.service
    owner: root
    group: root
    mode: '0644'

- name: Reload systemd for RR DB access units
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start RR DB ingress firewall service
  ansible.builtin.systemd:
    name: rr-db-ts-firewall.service
    enabled: true
    state: started

- name: Apply RR DB ingress firewall rules now
  ansible.builtin.command: /usr/local/sbin/rr-db-ts-firewall
  changed_when: false

- name: Enable and start RR DB Tailscale proxy service
  ansible.builtin.systemd:
    name: rr-db-ts-proxy.service
    enabled: true
    state: started

- name: Read DB container gateway IP for pg_hba allow list
  ansible.builtin.command: >-
    docker inspect {{ rr_db_access_cfg.db_container }}
  register: rr_db_container_inspect
  changed_when: false

- name: Parse DB container gateway IP
  ansible.builtin.set_fact:
    rr_db_container_gateway: >-
      {{
        ((rr_db_container_inspect.stdout | from_json)[0].NetworkSettings.Networks | dict2items | first).value.Gateway
      }}

- name: Assert DB container gateway IP is available
  ansible.builtin.assert:
    that:
      - rr_db_container_gateway | default('') | length > 0
    fail_msg: "Unable to determine DB container gateway IP for pg_hba allow list."

- name: Enforce pg_hba rules for RR worker user (and strip entries for remove_users)
  ansible.builtin.shell: |
    set -euo pipefail
    docker exec {{ rr_db_access_cfg.db_container }} sh -lc '
      set -e
      HBA={{ rr_db_access_cfg.pg_hba_file | default("/var/lib/postgresql/data/pg_hba.conf") }}
      TMP=$(mktemp)
      # Start from existing HBA, then strip entries for the managed user and any removed users.
      cp "$HBA" "$TMP"
      {% for u in [rr_db_access_cfg.username] + (rr_db_access_cfg.remove_users | default([])) %}
      grep -vF "{{ u }}" "$TMP" > "$TMP.new" && mv "$TMP.new" "$TMP"
      {% endfor %}
      # Prepend fresh rules for the current managed user.
      {
        printf "host {{ rr_db_access_cfg.database }} {{ rr_db_access_cfg.username }} {{ rr_db_container_gateway }}/32 scram-sha-256\n"
        printf "host {{ rr_db_access_cfg.database }} {{ rr_db_access_cfg.username }} 0.0.0.0/0 reject\n"
        printf "host {{ rr_db_access_cfg.database }} {{ rr_db_access_cfg.username }} ::0/0 reject\n"
        cat "$TMP"
      } > "$HBA"
      rm -f "$TMP"
      psql -U {{ rr_db_access_cfg.admin_user | default("postgres") }} -d {{ rr_db_access_cfg.database }} -c "SELECT pg_reload_conf();" >/dev/null
    '
  args:
    executable: /bin/bash
  changed_when: false

- name: Ensure RR worker DB user and strict grants
  ansible.builtin.shell: |
    set -euo pipefail
    docker exec -i {{ rr_db_access_cfg.db_container }} psql -U {{ rr_db_access_cfg.admin_user | default('postgres') }} -d {{ rr_db_access_cfg.database }} <<'SQL'
    DO $$
    BEGIN
      IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = '{{ rr_db_access_cfg.username }}') THEN
        CREATE ROLE {{ rr_db_access_cfg.username }} LOGIN PASSWORD '{{ lookup('vars', rr_db_access_cfg.password_var) }}';
      ELSE
        ALTER ROLE {{ rr_db_access_cfg.username }} LOGIN PASSWORD '{{ lookup('vars', rr_db_access_cfg.password_var) }}';
      END IF;
    END
    $$;

    -- Strict grants: role owns what privileges this user has on public schema.
    -- Revoke everything, then grant exactly the declared set. If RR's app needs
    -- a privilege that isn't in rr_db_access.grants, it will fail — by design.
    REVOKE ALL PRIVILEGES ON ALL TABLES IN SCHEMA public FROM {{ rr_db_access_cfg.username }};
    REVOKE ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public FROM {{ rr_db_access_cfg.username }};
    ALTER DEFAULT PRIVILEGES IN SCHEMA public REVOKE ALL ON TABLES FROM {{ rr_db_access_cfg.username }};
    ALTER DEFAULT PRIVILEGES IN SCHEMA public REVOKE ALL ON SEQUENCES FROM {{ rr_db_access_cfg.username }};

    REVOKE ALL ON DATABASE {{ rr_db_access_cfg.database }} FROM {{ rr_db_access_cfg.username }};
    GRANT CONNECT ON DATABASE {{ rr_db_access_cfg.database }} TO {{ rr_db_access_cfg.username }};
    GRANT USAGE ON SCHEMA public TO {{ rr_db_access_cfg.username }};

    GRANT {{ (rr_db_access_cfg.grants | default(['SELECT'])) | join(', ') }} ON ALL TABLES IN SCHEMA public TO {{ rr_db_access_cfg.username }};
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT {{ (rr_db_access_cfg.grants | default(['SELECT'])) | join(', ') }} ON TABLES TO {{ rr_db_access_cfg.username }};

    -- Sequences: default to SELECT (covers nextval/currval for SERIAL columns).
    -- Widening sequence grants beyond SELECT is a separate concern; add a
    -- sequence_grants config field if ever needed.
    GRANT SELECT ON ALL SEQUENCES IN SCHEMA public TO {{ rr_db_access_cfg.username }};
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON SEQUENCES TO {{ rr_db_access_cfg.username }};
    SQL
  args:
    executable: /bin/bash
  changed_when: false
  no_log: true

- name: Remove users listed in remove_users
  # Uses format('%I', ...) to safely quote role identifiers inside EXECUTE.
  # Terminates any active sessions, releases owned objects / grants, then drops.
  # Idempotent via IF EXISTS guard — no-op when the role is already absent.
  ansible.builtin.shell: |
    set -euo pipefail
    docker exec -i {{ rr_db_access_cfg.db_container }} psql -U {{ rr_db_access_cfg.admin_user | default('postgres') }} -d {{ rr_db_access_cfg.database }} <<'SQL'
    DO $$
    DECLARE
      target_role TEXT := '{{ item }}';
    BEGIN
      IF EXISTS (SELECT 1 FROM pg_roles WHERE rolname = target_role) THEN
        PERFORM pg_terminate_backend(pid)
          FROM pg_stat_activity
          WHERE usename = target_role;
        EXECUTE format('REASSIGN OWNED BY %I TO postgres', target_role);
        EXECUTE format('DROP OWNED BY %I', target_role);
        EXECUTE format('DROP ROLE %I', target_role);
      END IF;
    END
    $$;
    SQL
  args:
    executable: /bin/bash
  loop: "{{ rr_db_access_cfg.remove_users | default([]) }}"
  loop_control:
    label: "{{ item }}"
  changed_when: false
