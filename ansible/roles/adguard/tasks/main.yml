---
- name: Install AdGuardHome dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - dnsutils
      - tar
    state: present
    update_cache: true

- name: Disable systemd-resolved stub listener
  ansible.builtin.lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: '^DNSStubListener='
    line: DNSStubListener=no
    create: true
    mode: '0644'

- name: Stop and disable systemd-resolved
  ansible.builtin.service:
    name: systemd-resolved
    state: stopped
    enabled: false

- name: Check resolv.conf status
  ansible.builtin.stat:
    path: /etc/resolv.conf
  register: resolv_conf_stat

- name: Remove systemd-resolved resolv.conf symlink
  ansible.builtin.file:
    path: /etc/resolv.conf
    state: absent
  when: resolv_conf_stat.stat.islnk | default(false)

- name: Choose resolv.conf nameserver
  ansible.builtin.set_fact:
    adguard_resolv_nameserver: >-
      {{ (config.adguard.dns.upstream_dns[0]
          if '://' not in config.adguard.dns.upstream_dns[0]
          else (config.adguard.dns.bootstrap_dns[0] | default('1.1.1.1'))) }}

- name: Write resolv.conf with upstream DNS
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    content: "nameserver {{ adguard_resolv_nameserver }}\n"
    mode: '0644'

- name: Ensure AdGuardHome install directory exists
  ansible.builtin.file:
    path: "{{ adguard_install_dir }}"
    state: directory
    mode: '0700'

- name: Download AdGuardHome release archive
  ansible.builtin.command:
    cmd: "curl -fsSL {{ adguard_download_url }} -o /tmp/adguardhome.tar.gz"
    creates: /tmp/adguardhome.tar.gz

- name: Extract AdGuardHome release
  ansible.builtin.unarchive:
    src: /tmp/adguardhome.tar.gz
    dest: /opt
    remote_src: true
    creates: "{{ adguard_install_dir }}/AdGuardHome"

- name: Ensure AdGuardHome binary is executable
  ansible.builtin.file:
    path: "{{ adguard_install_dir }}/AdGuardHome"
    mode: '0755'

- name: Check AdGuardHome service installation
  ansible.builtin.stat:
    path: /etc/systemd/system/AdGuardHome.service
  register: adguard_service

- name: Install AdGuardHome systemd service
  ansible.builtin.command:
    cmd: "{{ adguard_install_dir }}/AdGuardHome -s install"
  when: not adguard_service.stat.exists

- name: Re-check AdGuardHome service installation
  ansible.builtin.stat:
    path: /etc/systemd/system/AdGuardHome.service
  register: adguard_service_after

- name: Render AdGuardHome configuration
  ansible.builtin.template:
    src: AdGuardHome.yaml.j2
    dest: "{{ adguard_config_path }}"
    mode: '0644'
  register: adguard_config_rendered
  notify: Restart AdGuardHome

# The template render is intentionally a partial seed of AdGuardHome.yaml
# (it does not contain persistent clients, user rules, or rewrites — those
# are managed by API tasks below). The template render therefore wipes
# those dynamic sections from disk on every run. We must restart AdGuardHome
# *now* so that subsequent API tasks see the post-render empty state and
# fully rebuild it via drift detection. Without this flush, the API tasks
# would read the still-loaded in-memory state, find no drift, write nothing,
# and the end-of-play restart would then load the stripped file and lose
# all dynamic state.
- name: Apply AdGuardHome restart immediately so API tasks see fresh state
  ansible.builtin.meta: flush_handlers

- name: Ensure AdGuardHome service is enabled and running
  ansible.builtin.service:
    name: AdGuardHome
    state: started
    enabled: true

- name: Wait for AdGuard Home API
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ config.adguard.bind_port }}/control/status"
    method: GET
    user: "{{ config.adguard.admin_user }}"
    password: "{{ adguard_admin_password }}"
    force_basic_auth: true
    status_code: 200
  register: adguard_status
  retries: 10
  delay: 3
  until: adguard_status.status == 200
  when: (config.adguard.rewrites | default([]) | length > 0) or (config.adguard.user_rules | default([]) | length > 0)

- name: Read current AdGuard DNS config
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ config.adguard.bind_port }}/control/dns_info"
    method: GET
    user: "{{ config.adguard.admin_user }}"
    password: "{{ adguard_admin_password }}"
    force_basic_auth: true
    return_content: true
    status_code: 200
  register: adguard_dns_info
  when: config.adguard.dns is defined

- name: Decide if AdGuard DNS config needs update
  ansible.builtin.set_fact:
    adguard_dns_config_need_update: >-
      {{
        ((adguard_dns_info.json.resolve_clients | default(false) | bool)
          != (config.adguard.dns.resolve_clients | default(false) | bool))
        or ((adguard_dns_info.json.use_private_ptr_resolvers | default(false) | bool)
          != (config.adguard.dns.use_private_ptr_resolvers | default(false) | bool))
        or ((adguard_dns_info.json.local_ptr_upstreams | default([]) | sort)
          != ((config.adguard.dns.local_ptr_upstreams | default([])) | sort))
        or ((adguard_dns_info.json.cache_optimistic | default(false) | bool)
          != (config.adguard.dns.cache_optimistic | default(false) | bool))
        or ((adguard_dns_info.json.upstream_dns | default([]) | sort)
          != (config.adguard.dns.upstream_dns | default([]) | sort))
      }}
  when: adguard_dns_info.json is defined

- name: Update AdGuard DNS config
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ config.adguard.bind_port }}/control/dns_config"
    method: POST
    user: "{{ config.adguard.admin_user }}"
    password: "{{ adguard_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      resolve_clients: "{{ config.adguard.dns.resolve_clients | default(false) | bool }}"
      use_private_ptr_resolvers: "{{ config.adguard.dns.use_private_ptr_resolvers | default(false) | bool }}"
      local_ptr_upstreams: "{{ config.adguard.dns.local_ptr_upstreams | default([]) }}"
      cache_optimistic: "{{ config.adguard.dns.cache_optimistic | default(false) | bool }}"
      upstream_dns: "{{ config.adguard.dns.upstream_dns | default([]) }}"
    status_code: 200
  when: adguard_dns_config_need_update | default(false)

- name: Read current AdGuard safe-search status
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ config.adguard.bind_port }}/control/safesearch/status"
    method: GET
    user: "{{ config.adguard.admin_user }}"
    password: "{{ adguard_admin_password }}"
    force_basic_auth: true
    return_content: true
    status_code: 200
  register: adguard_safesearch_status
  when: config.adguard.filtering.safe_search is defined

- name: Disable AdGuard safe-search when configured
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ config.adguard.bind_port }}/control/safesearch/disable"
    method: POST
    user: "{{ config.adguard.admin_user }}"
    password: "{{ adguard_admin_password }}"
    force_basic_auth: true
    status_code: 200
  when:
    - config.adguard.filtering.safe_search is defined
    - not (config.adguard.filtering.safe_search.enabled | default(false) | bool)
    - adguard_safesearch_status.json.enabled | default(false) | bool

- name: Enable AdGuard safe-search when configured
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ config.adguard.bind_port }}/control/safesearch/enable"
    method: POST
    user: "{{ config.adguard.admin_user }}"
    password: "{{ adguard_admin_password }}"
    force_basic_auth: true
    status_code: 200
  when:
    - config.adguard.filtering.safe_search is defined
    - config.adguard.filtering.safe_search.enabled | default(false) | bool
    - not (adguard_safesearch_status.json.enabled | default(false) | bool)

- name: Read existing AdGuard clients
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ config.adguard.bind_port }}/control/clients"
    method: GET
    user: "{{ config.adguard.admin_user }}"
    password: "{{ adguard_admin_password }}"
    force_basic_auth: true
    return_content: true
    status_code: 200
  register: adguard_clients_state
  when: config.adguard.client_overrides | default([]) | length > 0

- name: Build AdGuard client override drift list
  ansible.builtin.set_fact:
    adguard_client_overrides_drift: "{{ (adguard_client_overrides_drift | default([])) + [item] }}"
  loop: "{{ config.adguard.client_overrides | default([]) }}"
  vars:
    existing_client: >-
      {{
        (adguard_clients_state.json.clients | default([]))
        | selectattr('name', 'equalto', item.name)
        | first
        | default({})
      }}
  when:
    - config.adguard.client_overrides | default([]) | length > 0
    - existing_client == {}
      or ((existing_client.ids | default([]) | sort) != (item.ids | default([]) | sort))
      or ((existing_client.filtering_enabled | default(true) | bool) != (item.filtering_enabled | default(true) | bool))
      or ((existing_client.use_global_settings | default(true) | bool) != (item.use_global_settings | default(true) | bool))
      or ((existing_client.use_global_blocked_services | default(true) | bool) != (item.use_global_blocked_services | default(true) | bool))

- name: Remove drifted AdGuard clients before recreate
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ config.adguard.bind_port }}/control/clients/delete"
    method: POST
    user: "{{ config.adguard.admin_user }}"
    password: "{{ adguard_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      name: "{{ item.name }}"
    status_code: 200
  loop: "{{ adguard_client_overrides_drift | default([]) }}"
  vars:
    existing_client: >-
      {{
        (adguard_clients_state.json.clients | default([]))
        | selectattr('name', 'equalto', item.name)
        | first
        | default({})
      }}
  when: existing_client != {}

- name: Apply AdGuard client overrides
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ config.adguard.bind_port }}/control/clients/add"
    method: POST
    user: "{{ config.adguard.admin_user }}"
    password: "{{ adguard_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      name: "{{ item.name }}"
      ids: "{{ item.ids | default([]) }}"
      filtering_enabled: "{{ item.filtering_enabled | default(true) | bool }}"
      use_global_settings: "{{ item.use_global_settings | default(true) | bool }}"
      use_global_blocked_services: "{{ item.use_global_blocked_services | default(true) | bool }}"
    status_code: 200
  loop: "{{ adguard_client_overrides_drift | default([]) }}"

- name: Read existing AdGuard user rules
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ config.adguard.bind_port }}/control/filtering/status"
    method: GET
    user: "{{ config.adguard.admin_user }}"
    password: "{{ adguard_admin_password }}"
    force_basic_auth: true
    return_content: true
    status_code: 200
  register: adguard_filtering_status
  when: config.adguard.user_rules | default([]) | length > 0

- name: Normalize existing AdGuard user rules
  ansible.builtin.set_fact:
    adguard_existing_user_rules: "{{ adguard_filtering_status.json.user_rules | default([]) }}"
    adguard_desired_user_rules: "{{ config.adguard.user_rules | default([]) }}"
  when: config.adguard.user_rules | default([]) | length > 0

- name: Decide if AdGuard user rules need update
  ansible.builtin.set_fact:
    adguard_user_rules_need_update: "{{ (adguard_desired_user_rules | difference(adguard_existing_user_rules)) | length > 0 or (adguard_existing_user_rules | difference(adguard_desired_user_rules)) | length > 0 }}"
  when: config.adguard.user_rules | default([]) | length > 0

- name: Update AdGuard user rules
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ config.adguard.bind_port }}/control/filtering/set_rules"
    method: POST
    user: "{{ config.adguard.admin_user }}"
    password: "{{ adguard_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      rules: "{{ adguard_desired_user_rules }}"
    status_code: 200
  when:
    - config.adguard.user_rules | default([]) | length > 0
    - adguard_user_rules_need_update | default(false)

- name: Read existing AdGuard rewrites
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ config.adguard.bind_port }}/control/rewrite/list"
    method: GET
    user: "{{ config.adguard.admin_user }}"
    password: "{{ adguard_admin_password }}"
    force_basic_auth: true
    return_content: true
    status_code: 200
  register: adguard_rewrite_list
  when: config.adguard.rewrites | default([]) | length > 0

- name: Normalize existing AdGuard rewrites
  ansible.builtin.set_fact:
    adguard_existing_rewrites: "{{ adguard_rewrite_list.json | default([]) }}"
  when: config.adguard.rewrites | default([]) | length > 0

- name: Remove conflicting AdGuard rewrites
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ config.adguard.bind_port }}/control/rewrite/delete"
    method: POST
    user: "{{ config.adguard.admin_user }}"
    password: "{{ adguard_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      domain: "{{ item.domain }}"
      answer: "{{ (adguard_existing_rewrites | selectattr('domain', 'equalto', item.domain) | map(attribute='answer') | first) }}"
    status_code: 200
  loop: "{{ config.adguard.rewrites | default([]) }}"
  when:
    - config.adguard.rewrites | default([]) | length > 0
    - (adguard_existing_rewrites | selectattr('domain', 'equalto', item.domain) | list | length) > 0
    - (adguard_existing_rewrites | selectattr('domain', 'equalto', item.domain) | selectattr('answer', 'equalto', item.answer) | list | length) == 0

- name: Ensure AdGuard rewrites exist
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:{{ config.adguard.bind_port }}/control/rewrite/add"
    method: POST
    user: "{{ config.adguard.admin_user }}"
    password: "{{ adguard_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      domain: "{{ item.domain }}"
      answer: "{{ item.answer }}"
    status_code: 200
  loop: "{{ config.adguard.rewrites | default([]) }}"
  when:
    - config.adguard.rewrites | default([]) | length > 0
    - (adguard_existing_rewrites | selectattr('domain', 'equalto', item.domain) | selectattr('answer', 'equalto', item.answer) | list | length) == 0
