services:
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=1y
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    restart: unless-stopped

  json-exporter:
    image: prometheuscommunity/json-exporter:latest
    command: ["--config.file=/etc/json-exporter/config.yml"]
    volumes:
      - ./json-exporter.yml:/etc/json-exporter/config.yml:ro
      - ./rr_password:/etc/json-exporter/rr_password:ro
    ports:
      - "7979:7979"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://grafana.laxdog.uk
      - GF_AUTH_ANONYMOUS_ENABLED=false
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
