homelab:
  name: homelab
  timezone: America/Los_Angeles
network:
  subnet: 10.20.30.0/24
  gateway: 10.20.30.1
  bridge: vmbr0
  reserved:
    router: 10.20.30.1
    adguard: 10.20.30.153
    proxmox: 10.20.30.46
  ranges:
    guests:
      start: 10.20.30.100
      end: 10.20.30.199
      convention: ctid_equals_last_octet
    dhcp:
      start: 10.20.30.200
      end: 10.20.30.249
  legacy_hosts:
    old_servarr: 10.20.30.74
    nas_old: 10.20.30.151
    old_server: 10.20.30.155
  optional:
    unifi_nano_beam_1: 10.20.30.50
    unifi_nano_beam_2: 10.20.30.51
proxmox:
  node: pve
  endpoint: https://10.20.30.46:8006/
  ssh_host: 10.20.30.46
  ssh_user: root
  terraform_user: terraform-prov@pve
  ssh_public_key_path: /home/mrobinson/.ssh/id_rsa.pub
  ssh_private_key_path: /home/mrobinson/.ssh/id_rsa
  storages:
    vm_disk: local-lvm
    local_dir: local
    backups_dir: tank-backups
    templates_dir: tank-templates
  templates:
    lxc:
      url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64-root.tar.xz
      file_name: ubuntu-24.04-standard_24.04-2_amd64.tar.zst
    vm:
      url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
      file_name: ubuntu-24.04-cloudimg-amd64.qcow2
    haos:
      url: https://github.com/home-assistant/operating-system/releases/download/17.1/haos_ova-17.1.qcow2.xz
      file_name: haos_ova-17.1.qcow2
      archive_name: haos_ova-17.1.qcow2.xz
storage:
  zfs:
    pool: tank
    datasets:
    - name: tank/media
      mountpoint: /tank/media
    - name: tank/downloads
      mountpoint: /tank/downloads
    - name: tank/personal
      mountpoint: /tank/personal
    - name: tank/backups
      mountpoint: /tank/backups
    - name: tank/templates
      mountpoint: /tank/templates
    - name: tank/scratch
      mountpoint: /tank/scratch
    backups_dataset: tank/backups
    appdata_location: nvme
naming:
  domains:
    external: lax.dog
    internal: laxdog.uk
ups:
  enabled: true
  vendor: APC
  model: Back-UPS ES BE850G2
  usb_attached: false
  bind_host: 10.20.30.46
adguard:
  admin_user: admin
  bind_host: 0.0.0.0
  bind_port: 80
  dns:
    bind_hosts:
    - 0.0.0.0
    port: 53
    upstream_dns:
    - https://dns10.quad9.net/dns-query
    bootstrap_dns:
    - 9.9.9.10
    - 149.112.112.10
    - 2620:fe::10
    - 2620:fe::fe:10
  tests:
    good_domain: example.com
    bad_domain: doubleclick.net
  filters:
    blocklists:
    - name: AdGuard DNS filter
      url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt
      enabled: true
    - name: AdAway Default Blocklist
      url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_2.txt
      enabled: false
    - name: HaGeZi's Pro Blocklist
      url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_48.txt
      enabled: true
    - name: OISD Blocklist Big
      url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_27.txt
      enabled: true
    - name: HaGeZi's Threat Intelligence Feeds
      url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_44.txt
      enabled: true
    - name: AdGuard DNS Popup Hosts filter
      url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_59.txt
      enabled: true
    - name: Phishing URL Blocklist (PhishTank and OpenPhish)
      url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_30.txt
      enabled: true
    - name: HaGeZi's Samsung Tracker Blocklist
      url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_61.txt
      enabled: true
    - name: HaGeZi's Xiaomi Tracker Blocklist
      url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_60.txt
      enabled: true
    allowlists: []
  rewrites:
  - domain: dns.laxdog.uk
    answer: 10.20.30.154
  - domain: npm.laxdog.uk
    answer: 10.20.30.154
  - domain: proxmox.laxdog.uk
    answer: 10.20.30.154
  - domain: organizr.laxdog.uk
    answer: 10.20.30.154
  - domain: heimdall.laxdog.uk
    answer: 10.20.30.154
  - domain: rss.laxdog.uk
    answer: 10.20.30.154
  - domain: netalertx.laxdog.uk
    answer: 10.20.30.154
  - domain: health.laxdog.uk
    answer: 10.20.30.154
  - domain: couchdb.laxdog.uk
    answer: 10.20.30.154
  - domain: browser.laxdog.uk
    answer: 10.20.30.154
  - domain: apt.laxdog.uk
    answer: 10.20.30.154
  - domain: sites.laxdog.uk
    answer: 10.20.30.154
  - domain: auth.laxdog.uk
    answer: 10.20.30.154
  - domain: ha.laxdog.uk
    answer: 10.20.30.154
  - domain: nagios.laxdog.uk
    answer: 10.20.30.154
  user_rules:
  - '@@||click.figma.com^$client=''10.20.30.201'''
  - '@@||analytics.google.com^$client=''10.20.30.201'''
  - '@@||amplitude.com^$client=''10.20.30.201'''
  - '@@||amplitude.com^$client=''10.20.30.204'''
  - '@@||click.figma.com^$client=''10.20.30.204'''
  - '@@||www.googletagmanager.com^$client=''10.20.30.201'''
  - '@@||analytics.google.com^$client=''10.20.30.204'''
  - '@@||cfklr04.na1.hs-sales-engage.com^$client=''10.20.30.75'''
  - '@@||api.mixpanel.com^$client=''10.20.30.75'''
  - '@@||sentry.io^$client=''10.20.30.75'''
  - '@@||api.eu.amplitude.com^$client=''10.20.30.208'''
  - '@@||amplitude.com^$client=''10.20.30.208'''
  - '@@||api.lab.amplitude.com^$client=''10.20.30.108'''
  - '@@||hotjar.com^$client=''10.20.30.75'''
  - '@@||region1.google-analytics.com^$client=''10.20.30.208'''
  - '@@||amplitude.prismic.io^$client=''10.20.30.208'''
