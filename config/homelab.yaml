homelab:
  name: homelab
  timezone: America/Los_Angeles

network:
  subnet: 10.20.30.0/24
  gateway: 10.20.30.1
  bridge: vmbr0
  reserved:
    router: 10.20.30.1
    adguard: 10.20.30.153
    proxmox: 10.20.30.46
  ranges:
    guests:
      start: 10.20.30.100
      end: 10.20.30.199
      convention: ctid_equals_last_octet
    dhcp:
      start: 10.20.30.200
      end: 10.20.30.249
  legacy_hosts:
    old_servarr: 10.20.30.74
    nas_old: 10.20.30.151
    old_server: 10.20.30.155
  optional:
    unifi_nano_beam_1: 10.20.30.50
    unifi_nano_beam_2: 10.20.30.51

proxmox:
  node: pve
  endpoint: https://10.20.30.46:8006/
  ssh_host: 10.20.30.46
  ssh_user: root
  terraform_user: terraform-prov@pve
  ssh_public_key_path: /home/mrobinson/.ssh/id_rsa.pub
  ssh_private_key_path: /home/mrobinson/.ssh/id_rsa
  storages:
    vm_disk: local-lvm
    local_dir: local
    backups_dir: tank-backups
    templates_dir: tank-templates
  templates:
    lxc:
      url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64-root.tar.xz
      file_name: ubuntu-24.04-standard_24.04-2_amd64.tar.zst
    vm:
      url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
      file_name: ubuntu-24.04-cloudimg-amd64.qcow2

storage:
  zfs:
    pool: tank
    datasets:
      - name: tank/media
        mountpoint: /tank/media
      - name: tank/downloads
        mountpoint: /tank/downloads
      - name: tank/personal
        mountpoint: /tank/personal
      - name: tank/backups
        mountpoint: /tank/backups
      - name: tank/templates
        mountpoint: /tank/templates
      - name: tank/scratch
        mountpoint: /tank/scratch
    backups_dataset: tank/backups
    appdata_location: nvme

naming:
  domains:
    external: lax.dog
    internal: laxdog.uk

ups:
  enabled: true
  vendor: APC
  model: Back-UPS ES BE850G2
  usb_attached: false
  bind_host: 10.20.30.46

adguard:
  admin_user: admin
  bind_host: 0.0.0.0
  bind_port: 80
  dns:
    bind_hosts:
      - 0.0.0.0
    port: 53
    upstream_dns:
      - 1.1.1.1
    bootstrap_dns:
      - 1.1.1.1
  tests:
    good_domain: example.com
    bad_domain: doubleclick.net
  filters:
    blocklists:
      - name: Hagezi Pro++
        url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/pro.plus.txt
        enabled: true
      - name: Hagezi TIF
        url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/tif.txt
        enabled: true
    allowlists:
      - name: Hagezi Allowlist Referral
        url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/whitelist-referral.txt
        enabled: true
  rewrites:
    - domain: dns.laxdog.uk
      answer: 10.20.30.154
    - domain: npm.laxdog.uk
      answer: 10.20.30.154
    - domain: proxmox.laxdog.uk
      answer: 10.20.30.154
    - domain: organizr.laxdog.uk
      answer: 10.20.30.154
    - domain: heimdall.laxdog.uk
      answer: 10.20.30.154
    - domain: rss.laxdog.uk
      answer: 10.20.30.154
    - domain: netalertx.laxdog.uk
      answer: 10.20.30.154
    - domain: health.laxdog.uk
      answer: 10.20.30.154
    - domain: couchdb.laxdog.uk
      answer: 10.20.30.154
    - domain: browser.laxdog.uk
      answer: 10.20.30.154
    - domain: apt.laxdog.uk
      answer: 10.20.30.154
    - domain: sites.laxdog.uk
      answer: 10.20.30.154
    - domain: auth.laxdog.uk
      answer: 10.20.30.154

services:
  defaults:
    vm:
      cores: 2
      memory_mb: 4096
      disk_gb: 32
    lxc:
      cores: 2
      memory_mb: 1024
      disk_gb: 8
      unprivileged: true
      nesting: true
  vms:
    media-stack:
      id: 120
      ip: 10.20.30.120
      roles: [docker, media]
      os: ubuntu
      cores: 4
      memory_mb: 8192
      disk_gb: 64
      mounts:
        - /tank/media:/mnt/media
        - /tank/downloads:/mnt/downloads
    nfs-server:
      id: 121
      ip: 10.20.30.121
      roles: [nfs]
      os: ubuntu
      cores: 2
      memory_mb: 2048
      disk_gb: 16
      mounts:
        - /tank/personal:/mnt/personal
        - /tank/media:/mnt/media
        - /tank/downloads:/mnt/downloads
    home-assistant:
      id: 122
      ip: 10.20.30.122
      roles: [haos]
      os: haos
  lxcs:
    adguard:
      id: 153
      ip: 10.20.30.153
      roles: [adguard]
    nginx-proxy-manager:
      id: 154
      ip: 10.20.30.154
      roles: [docker, nginx_proxy_manager]
    couchdb:
      id: 165
      ip: 10.20.30.165
      roles: [couchdb]
    apt-cacher-ng:
      id: 156
      ip: 10.20.30.156
      roles: [apt_cacher]
    freshrss:
      id: 157
      ip: 10.20.30.157
      roles: [freshrss]
    netalertx:
      id: 158
      ip: 10.20.30.158
      roles: [netalertx]
    healthchecks:
      id: 159
      ip: 10.20.30.159
      roles: [healthchecks]
    dashboard:
      id: 160
      ip: 10.20.30.160
      roles: [dashboard]
    static-sites:
      id: 161
      ip: 10.20.30.161
      roles: [static_sites]
    browser:
      id: 162
      ip: 10.20.30.162
      roles: [browser]
    python-bot:
      id: 163
      ip: 10.20.30.163
      roles: [python_bot]
    organizr:
      id: 164
      ip: 10.20.30.164
      roles: [docker, organizr]
    heimdall:
      id: 166
      ip: 10.20.30.166
      roles: [docker, heimdall]
    authentik:
      id: 170
      ip: 10.20.30.170
      roles: [docker, authentik]

security:
  ansible_vault: true

npm:
  admin_email: admin@example.com
  api_email: automation@lax.dog
  access_user: adguard
  external_enabled: true
  remove_proxy_hosts:
    - dns.lax.dog
    - sites.lax.dog
    - organizr.lax.dog
    - heimdall.lax.dog
    - rss.lax.dog
    - couchdb.lax.dog
    - browser.lax.dog
  access_lists:
    - name: Internal Access
      auth: none
      clients:
        - address: 10.20.30.0/24
          directive: allow
    - name: External Protected
      auth: basic
      clients:
        - address: 0.0.0.0/0
          directive: allow
    - name: External Public
      auth: none
      clients:
        - address: 0.0.0.0/0
          directive: allow
  certificates:
    - name: laxdog-internal-le
      type: letsencrypt
      dns_provider: cloudflare
      domains:
        - dns.laxdog.uk
        - npm.laxdog.uk
        - proxmox.laxdog.uk
        - organizr.laxdog.uk
        - heimdall.laxdog.uk
        - rss.laxdog.uk
        - netalertx.laxdog.uk
        - health.laxdog.uk
        - couchdb.laxdog.uk
        - browser.laxdog.uk
        - apt.laxdog.uk
        - sites.laxdog.uk
        - auth.laxdog.uk
    - name: laxdog-external-le
      type: letsencrypt
      dns_provider: cloudflare
      domains:
        - auth.lax.dog
  proxy_hosts:
    - name: AdGuard Internal
      domain: dns.laxdog.uk
      forward_host: 10.20.30.153
      forward_port: 80
      access_list: Internal Access
      ssl: true
      certificate: laxdog-internal-le
    - name: NPM
      domain: npm.laxdog.uk
      forward_host: 10.20.30.154
      forward_port: 81
      access_list: Internal Access
      ssl: true
      certificate: laxdog-internal-le
    - name: Proxmox
      domain: proxmox.laxdog.uk
      forward_scheme: https
      forward_host: 10.20.30.46
      forward_port: 8006
      access_list: Internal Access
      ssl: true
      certificate: laxdog-internal-le
    - name: Organizr
      domain: organizr.laxdog.uk
      forward_host: 10.20.30.164
      forward_port: 80
      access_list: Internal Access
      ssl: true
      certificate: laxdog-internal-le
    - name: Heimdall
      domain: heimdall.laxdog.uk
      forward_host: 10.20.30.166
      forward_port: 80
      access_list: Internal Access
      ssl: true
      certificate: laxdog-internal-le
    - name: FreshRSS
      domain: rss.laxdog.uk
      forward_host: 10.20.30.157
      forward_port: 80
      access_list: Internal Access
      ssl: true
      certificate: laxdog-internal-le
    - name: NetAlertX
      domain: netalertx.laxdog.uk
      forward_host: 10.20.30.158
      forward_port: 20211
      access_list: Internal Access
      ssl: true
      certificate: laxdog-internal-le
    - name: Healthchecks
      domain: health.laxdog.uk
      forward_host: 10.20.30.159
      forward_port: 8000
      access_list: Internal Access
      ssl: true
      certificate: laxdog-internal-le
    - name: CouchDB
      domain: couchdb.laxdog.uk
      forward_host: 10.20.30.165
      forward_port: 5984
      access_list: Internal Access
      ssl: true
      certificate: laxdog-internal-le
    - name: Browser
      domain: browser.laxdog.uk
      forward_host: 10.20.30.162
      forward_port: 5800
      access_list: Internal Access
      ssl: true
      certificate: laxdog-internal-le
    - name: Apt Cacher
      domain: apt.laxdog.uk
      forward_host: 10.20.30.156
      forward_port: 3142
      access_list: Internal Access
      ssl: true
      certificate: laxdog-internal-le
    - name: Static Sites Internal
      domain: sites.laxdog.uk
      forward_host: 10.20.30.161
      forward_port: 80
      access_list: Internal Access
      ssl: true
      certificate: laxdog-internal-le
    - name: Authentik Internal
      domain: auth.laxdog.uk
      forward_host: 10.20.30.170
      forward_port: 9000
      access_list: Internal Access
      ssl: true
      certificate: laxdog-internal-le
  external_proxy_hosts:
    - name: Authentik External
      domain: auth.lax.dog
      forward_host: 10.20.30.170
      forward_port: 9000
      access_list: External Public
      ssl: true
      certificate: laxdog-external-le

organizr:
  admin_user: admin
  admin_email: admin@laxdog.uk
  license: personal
  db_name: organizr.db
  db_path: /config/www/organizr/data/db/

authentik:
  admin_email: admin@laxdog.uk
  admin_user: akadmin
  version: 2025.2.1
  port: 9000
  internal_domain: auth.laxdog.uk
  external_domain: auth.lax.dog

cloudflare:
  zone: lax.dog
  public_ip: auto
  remove_records:
    - dns.lax.dog
    - sites.lax.dog
    - organizr.lax.dog
    - heimdall.lax.dog
    - rss.lax.dog
    - couchdb.lax.dog
    - browser.lax.dog
  records:
    - type: A
      name: auth.lax.dog
      content: public_ip
      proxied: true

validation:
  service_ports:
    - name: adguard-http
      host: 10.20.30.153
      port: 80
    - name: adguard-dns
      host: 10.20.30.153
      port: 53
    - name: nginx-proxy-manager
      host: 10.20.30.154
      port: 81
    - name: nginx-proxy-manager-https
      host: 10.20.30.154
      port: 443
    - name: proxmox
      host: 10.20.30.46
      port: 8006
    - name: organizr
      host: 10.20.30.164
      port: 80
    - name: heimdall
      host: 10.20.30.166
      port: 80
    - name: freshrss
      host: 10.20.30.157
      port: 80
    - name: netalertx
      host: 10.20.30.158
      port: 20211
    - name: healthchecks
      host: 10.20.30.159
      port: 8000
    - name: couchdb
      host: 10.20.30.165
      port: 5984
    - name: browser
      host: 10.20.30.162
      port: 5800
    - name: apt-cacher-ng
      host: 10.20.30.156
      port: 3142
    - name: static-sites
      host: 10.20.30.161
      port: 80
    - name: authentik
      host: 10.20.30.170
      port: 9000
