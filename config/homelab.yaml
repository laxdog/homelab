services:
  defaults:
    vm:
      cores: 2
      memory_mb: 4096
      disk_gb: 32
    lxc:
      cores: 2
      memory_mb: 1024
      disk_gb: 8
      unprivileged: true
      nesting: true
  vms:
    media-stack:
      id: 120
      ip: 10.20.30.120
      roles:
      - docker
      - media
      os: ubuntu
      cores: 4
      memory_mb: 8192
      disk_gb: 64
      mounts:
      - /tank/media:/mnt/media
      - /tank/downloads:/mnt/downloads
    nfs-server:
      id: 121
      ip: 10.20.30.121
      roles:
      - nfs
      os: ubuntu
      cores: 2
      memory_mb: 2048
      disk_gb: 16
      mounts:
      - /tank/personal:/mnt/personal
      - /tank/media:/mnt/media
      - /tank/downloads:/mnt/downloads
    home-assistant:
      id: 122
      ip: 10.20.30.134
      roles:
      - haos
      os: haos
    nagios:
      id: 133
      ip: 10.20.30.133
      roles:
      - nagios
      os: ubuntu
      cores: 2
      memory_mb: 2048
      disk_gb: 16
  lxcs:
    adguard:
      id: 153
      ip: 10.20.30.153
      roles:
      - adguard
    nginx-proxy-manager:
      id: 154
      ip: 10.20.30.154
      roles:
      - docker
      - nginx_proxy_manager
    couchdb:
      id: 165
      ip: 10.20.30.165
      roles:
      - docker
      - couchdb
    apt-cacher-ng:
