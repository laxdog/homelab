      ip: 10.20.30.156
      roles:
      - apt_cacher
    freshrss:
      id: 157
      ip: 10.20.30.157
      roles:
      - docker
      - freshrss
    netalertx:
      id: 158
      ip: 10.20.30.158
      roles:
      - docker
      - netalertx
    healthchecks:
      id: 159
      ip: 10.20.30.159
      roles:
      - docker
      - healthchecks
    dashboard:
      id: 160
      ip: 10.20.30.160
      roles:
      - dashboard
    static-sites:
      id: 161
      ip: 10.20.30.161
      roles:
      - docker
      - static_sites
    browser:
      id: 162
      ip: 10.20.30.162
      roles:
      - docker
      - browser
    python-bot:
      id: 163
      ip: 10.20.30.163
      roles:
      - python_bot
    organizr:
