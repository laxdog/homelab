security:
  ansible_vault: true
npm:
  admin_email: admin@example.com
  api_email: automation@lax.dog
  access_user: adguard
  external_enabled: true
  remove_proxy_hosts:
  - dns.lax.dog
  - sites.lax.dog
  - organizr.lax.dog
  - heimdall.lax.dog
  - rss.lax.dog
  - couchdb.lax.dog
  - browser.lax.dog
  access_lists:
  - name: Internal Access
    auth: none
    clients:
    - address: 10.20.30.0/24
      directive: allow
  - name: External Protected
    auth: basic
    clients:
    - address: 0.0.0.0/0
      directive: allow
  - name: External Public
    auth: none
    clients:
    - address: 0.0.0.0/0
      directive: allow
  certificates:
  - name: laxdog-internal-le
    type: letsencrypt
    dns_provider: cloudflare
    domains:
    - dns.laxdog.uk
    - npm.laxdog.uk
    - proxmox.laxdog.uk
    - organizr.laxdog.uk
    - heimdall.laxdog.uk
    - rss.laxdog.uk
    - netalertx.laxdog.uk
    - health.laxdog.uk
    - couchdb.laxdog.uk
    - browser.laxdog.uk
    - apt.laxdog.uk
    - sites.laxdog.uk
    - auth.laxdog.uk
    - ha.laxdog.uk
    - nagios.laxdog.uk
  - name: laxdog-external-le
    type: letsencrypt
    dns_provider: cloudflare
    domains:
    - auth.lax.dog
  proxy_hosts:
  - name: AdGuard Internal
    domain: dns.laxdog.uk
    forward_host: 10.20.30.153
    forward_port: 80
    access_list: Internal Access
    ssl: true
    certificate: laxdog-internal-le
  - name: NPM
    domain: npm.laxdog.uk
    forward_host: 127.0.0.1
    forward_port: 81
    access_list: Internal Access
    ssl: true
    certificate: laxdog-internal-le
  - name: Proxmox
    domain: proxmox.laxdog.uk
    forward_scheme: https
    forward_host: 10.20.30.46
    forward_port: 8006
    access_list: Internal Access
    ssl: true
    certificate: laxdog-internal-le
  - name: Organizr
    domain: organizr.laxdog.uk
    forward_host: 10.20.30.164
    forward_port: 80
    access_list: Internal Access
    ssl: true
    certificate: laxdog-internal-le
  - name: Heimdall
    domain: heimdall.laxdog.uk
    forward_host: 10.20.30.166
    forward_port: 80
    access_list: Internal Access
    ssl: true
    certificate: laxdog-internal-le
  - name: FreshRSS
    domain: rss.laxdog.uk
    forward_host: 10.20.30.157
    forward_port: 80
    access_list: Internal Access
    ssl: true
    certificate: laxdog-internal-le
  - name: NetAlertX
    domain: netalertx.laxdog.uk
    forward_host: 10.20.30.158
    forward_port: 20211
    access_list: Internal Access
    ssl: true
    certificate: laxdog-internal-le
  - name: Healthchecks
    domain: health.laxdog.uk
    forward_host: 10.20.30.159
    forward_port: 8000
    access_list: Internal Access
    ssl: true
    certificate: laxdog-internal-le
  - name: CouchDB
    domain: couchdb.laxdog.uk
    forward_host: 10.20.30.165
    forward_port: 5984
    access_list: Internal Access
    ssl: true
    certificate: laxdog-internal-le
  - name: Browser
    domain: browser.laxdog.uk
    forward_host: 10.20.30.162
    forward_port: 5800
    access_list: Internal Access
    ssl: true
    certificate: laxdog-internal-le
  - name: Apt Cacher
    domain: apt.laxdog.uk
    forward_host: 10.20.30.156
    forward_port: 3142
    access_list: Internal Access
    ssl: true
    certificate: laxdog-internal-le
  - name: Static Sites Internal
    domain: sites.laxdog.uk
    forward_host: 10.20.30.161
    forward_port: 80
    access_list: Internal Access
    ssl: true
    certificate: laxdog-internal-le
  - name: Authentik Internal
    domain: auth.laxdog.uk
    forward_host: 10.20.30.170
    forward_port: 9000
    access_list: Internal Access
    ssl: true
    certificate: laxdog-internal-le
  - name: Home Assistant
    domain: ha.laxdog.uk
    forward_host: 10.20.30.134
    forward_port: 8123
    access_list: Internal Access
    ssl: true
    certificate: laxdog-internal-le
  - name: Nagios
    domain: nagios.laxdog.uk
    forward_host: 10.20.30.133
    forward_port: 80
    access_list: Internal Access
    ssl: true
    certificate: laxdog-internal-le
  external_proxy_hosts:
